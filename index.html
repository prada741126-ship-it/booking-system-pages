<script>
/**
 * firebase.js — Firebase Initialization + CRUD Operations
 * Pattern: faithfully reused from v13.0.5
 * Flow: initFirebase → signInAnonymously → _onFirebaseReady → startWatchers
 */
var _db = null;
var _authInstance = null;
var _initRetried = false;
var _initPollCount = 0;

/* ===== Initialization ===== */

function initFirebase(onReady) {
  _doInitFirebase(onReady);
}

function _doInitFirebase(onReady) {
  if (typeof firebase === 'undefined') {
    console.warn('[Firebase] SDK not loaded yet, retrying...');
    if (!_initRetried) {
      _initRetried = true;
      // Retry on window load
      if (typeof window !== 'undefined') {
        window.addEventListener('load', function () {
          _doInitFirebase(onReady);
        });
      }
      // Retry by polling
      _initPollCount = 0;
      var pollTimer = setInterval(function () {
        _initPollCount++;
        if (typeof firebase !== 'undefined') {
          clearInterval(pollTimer);
          _doInitFirebase(onReady);
        } else if (_initPollCount >= 30) {
          clearInterval(pollTimer);
          console.error('[Firebase] SDK failed to load after 30 retries');
          Events.emit(EVENTS.SYNC_ERROR, { error: 'SDK load failed' });
        }
      }, 1000);
    }
    return;
  }

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    console.log('[Firebase] App initialized');

    // Check if auth SDK is available
    if (typeof firebase.auth !== 'function') {
      console.warn('[Firebase] Auth SDK not loaded');
      _db = firebase.database();
      _watchConnection();
      if (onReady) onReady();
      return;
    }

    _authInstance = firebase.auth();

    // Must sign in anonymously before using database
    _authInstance.signInAnonymously().then(function () {
      console.log('[Firebase] Anonymous auth successful');

      // Only set _db after auth success (critical pattern from v13.0.5)
      var tempDb = firebase.database();
      _db = tempDb;

      // Start connection watcher
      _watchConnection();

      if (onReady) onReady();
    }).catch(function (err) {
      console.error('[Firebase] Anonymous auth failed:', err);
      _db = null;
      Events.emit(EVENTS.SYNC_ERROR, { error: 'Auth failed: ' + err.message });
      // Retry after delay
      setTimeout(function () {
        _doInitFirebase(onReady);
      }, 5000);
    });

  } catch (e) {
    console.error('[Firebase] Init error:', e);
    Events.emit(EVENTS.SYNC_ERROR, { error: e.message });
    setTimeout(function () {
      _doInitFirebase(onReady);
    }, 3000);
  }
}

    if (connected) {

      // Reconnect: download first, then upload
      setTimeout(function () {

      setTimeout(function () {

      var pending = paths.length;

<script>
/**
 * uploader.js — Upload Queue + Batch Sync
 * Pattern: faithfully reused from v13.0.5
 * Features: serial queue, overflow protection, delayed retry, batch upload
 */
var Uploader = (function () {
  var _queue = [];
  var _processing = false;

  function enqueueUpload(task) {
    if (!task) return;

    // Overflow protection
    if (_queue.length >= CONFIG.MAX_UPLOAD_QUEUE) {
      console.warn('[Uploader] Queue overflow, switching to full sync');
      _queue = [];
      syncUploadAll();
      return;
    }

    _queue.push(task);

    if (!_processing) {
      _processQueue();
    }
  }

  function _processQueue() {
    if (_queue.length === 0) {
      _processing = false;
      return;
    }

    _processing = true;

    if (!isFirebaseReady()) {
      // Firebase not ready — delay and retry
      setTimeout(function () {
        _processQueue();
      }, 1000);
      return;
    }

    var task = _queue.shift();
    _executeTask(task, function () {
      // Process next task
      _processQueue();
    });
  }

  function _executeTask(task, done) {
    try {
      switch (task.type) {
        case 'booking':
          if (task.action === 'set') {
            syncBookingToFirebase(task.data, done);
          } else if (task.action === 'remove') {
            removeBookingFromFirebase(task.data._fbKey, done);
          } else {
            done();
          }
          break;

        case 'hotelConfig':
          if (task.action === 'set') {
            syncHCToFirebase(task.data, done);
          } else if (task.action === 'remove') {
            removeHCFromFirebase(task.data._fbKey, done);
          } else {
            done();
          }
          break;

        case 'agentList':
          if (task.action === 'set') {
            syncAgentListToFirebase(task.data, done);
          } else {
            done();
          }
          break;

        case 'botLog':
          if (task.action === 'set') {
            syncBotLogToFirebase(task.data, done);
          } else {
            done();
          }
          break;

        default:
          console.warn('[Uploader] Unknown task type:', task.type);
          done();
      }
    } catch (e) {
      console.error('[Uploader] Task execution error:', e);
      done();
    }
  }

  /* ===== Full Upload Sync ===== */

  function syncUploadAll(callback) {
    if (!isFirebaseReady()) {
      console.warn('[Uploader] Firebase not ready, skipping full sync');
      if (callback) callback({ error: 'not_ready' });
      return;
    }

    Events.emit(EVENTS.SYNC_UPLOAD_START);
    console.log('[Uploader] Starting full upload sync');

    var paths = [
      { path: FB_PATH.BOOKINGS,     data: State.get('bookings'),     type: 'booking' },
      { path: FB_PATH.HOTEL_CONFIG, data: State.get('hotelConfig'),  type: 'hotelConfig' },
      { path: FB_PATH.BOT_LOGS,     data: State.get('botLogs'),      type: 'botLog' }
    ];

    var pending = paths.length;
    var hasError = false;

    paths.forEach(function (item) {
      _uploadPathData(item.path, item.data, item.type, function (err) {
        if (err) hasError = true;
        pending--;
        if (pending === 0) {
          // Upload agent list separately
          _uploadAgentList(function () {
            State.set('lastSyncTime', Date.now());
            Events.emit(EVENTS.SYNC_UPLOAD_DONE, { error: hasError });
            console.log('[Uploader] Full upload sync complete');
            if (callback) callback(hasError ? { error: 'partial' } : null);
          });
        }
      });
    });
  }

  function _uploadPathData(path, dataArray, type, done) {
    if (!dataArray || dataArray.length === 0) {
      // Write empty object
      _db.ref(path).set({}, function (err) {
        if (err) console.error('[Uploader] Clear path error:', path, err);
        done(err);
      });
      return;
    }

    try {
      _db.ref(path).transaction(function (current) {
        var remote = Utils.fbObjToArray(current);
        var merged = Merger.mergeArray(dataArray, remote);

        // Write tombstones for recently deleted items that still exist remotely
        var recentlyDeleted = RecentlyDeleted.getByType(type);
        for (var i = 0; i < recentlyDeleted.length; i++) {
          var stillExists = remote.some(function (r) {
            return r._fbKey === recentlyDeleted[i].fbKey && !r._deleted;
          });
          if (stillExists) {
            var tombstone = {
              _fbKey: recentlyDeleted[i].fbKey,
              _deleted: true,
              _updatedAt: recentlyDeleted[i].deletedAt
            };
            merged.push(tombstone);
          }
        }

        // Clean old tombstones
        merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);

        // Convert to object for Firebase
        var obj = {};
        for (var j = 0; j < merged.length; j++) {
          if (merged[j]._fbKey) {
            obj[merged[j]._fbKey] = merged[j];
          }
        }
        return obj;
      }, function (err) {
        if (err) {
          console.error('[Uploader] Transaction error for path:', path, err);
        }
        done(err);
      });
    } catch (e) {
      console.error('[Uploader] _uploadPathData exception:', e);
      done(e);
    }
  }

  function _uploadAgentList(done) {
    var agentList = State.get('agentList');
    if (!agentList || agentList.length === 0) {
      done();
      return;
    }
    syncAgentListToFirebase(agentList, done);
  }

  return {
    enqueueUpload: enqueueUpload,
    syncUploadAll: syncUploadAll,
    getQueueLength: function () { return _queue.length; }
  };
})();

/* Global function aliases (for app.js calls) */
function enqueueUpload(task) {
  Uploader.enqueueUpload(task);
}

function syncUploadAll(callback) {
  Uploader.syncUploadAll(callback);
}

</script>

<script>
/**
 * watchers.js — Firebase Real-time Listeners
 * Pattern: faithfully reused from v13.0.5
 * Features: 4 watchers (bookings/hotelConfig/agentList/botLogs) + clearedAt + connected
 * Each watcher: fetch remote → merge → filter tombstones → save → emit
 */
var _watchersStarted = false;

function startWatchers() {
  if (_watchersStarted) return;
  if (!isFirebaseReady()) {
    console.warn('[Watchers] Firebase not ready, cannot start');
    return;
  }
  _watchersStarted = true;
  console.log('[Watchers] Starting all watchers');

  _watchBookings();
  _watchHotelConfig();
  _watchAgentList();
  _watchBotLogs();
  _watchClearedAt();
}

/* ===== Bookings Watcher ===== */
function _watchBookings() {
  _db.ref(FB_PATH.BOOKINGS).on('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('bookings');
      var merged = Merger.mergeBookings(local, remote);

      // Clean old tombstones
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);

      // Filter tombstones for display
      var alive = Merger.filterAlive(merged);

      // Check if anything changed
      var changed = _hasChanged(local, alive);
      if (changed) {
        State.set('bookings', alive);
        Store.saveBookings(alive);
        Events.emit(EVENTS.BOOKINGS_SYNCED, alive);
        console.log('[Watchers] Bookings synced:', alive.length, 'items');
      }
    } catch (e) {
      console.error('[Watchers] Bookings watcher error:', e);
    }
  }, function (err) {
    console.error('[Watchers] Bookings listener error:', err);
  });
}

/* ===== Hotel Config Watcher ===== */
function _watchHotelConfig() {
  _db.ref(FB_PATH.HOTEL_CONFIG).on('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('hotelConfig');
      var merged = Merger.mergeHotelConfig(local, remote);
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);
      var alive = Merger.filterAlive(merged);

      var changed = _hasChanged(local, alive);
      if (changed) {
        State.set('hotelConfig', alive);
        Store.saveHotelConfig(alive);
        Events.emit(EVENTS.HC_LOADED, alive);
        console.log('[Watchers] Hotel config synced:', alive.length, 'items');
      }
    } catch (e) {
      console.error('[Watchers] HC watcher error:', e);
    }
  }, function (err) {
    console.error('[Watchers] HC listener error:', err);
  });
}

/* ===== Agent List Watcher ===== */
function _watchAgentList() {
  _db.ref(FB_PATH.AGENT_LIST).on('value', function (snap) {
    try {
      var remoteObj = snap.val();
      var remote = [];
      if (remoteObj) {
        for (var key in remoteObj) {
          if (remoteObj.hasOwnProperty(key)) {
            var item = remoteObj[key];
            if (item && typeof item === 'object') {
              remote.push(item);
            }
          }
        }
      }

      var local = State.get('agentList');
      // Agent list: merge by name (simple union, remote wins if conflict)
      var merged = _mergeAgentList(local, remote);

      var changed = _hasChanged(local, merged);
      if (changed) {
        State.set('agentList', merged);
        Store.saveAgentList(merged);
        Events.emit(EVENTS.AGENT_LIST_UPDATED, merged);
        console.log('[Watchers] Agent list synced:', merged.length, 'agents');
      }
    } catch (e) {
      console.error('[Watchers] AgentList watcher error:', e);
    }
  }, function (err) {
    console.error('[Watchers] AgentList listener error:', err);
  });
}

/* ===== Bot Logs Watcher ===== */
function _watchBotLogs() {
  _db.ref(FB_PATH.BOT_LOGS).on('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('botLogs');
      var merged = Merger.mergeArray(local, remote);
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);
      var alive = Merger.filterAlive(merged);

      // Sort by createdAt descending
      alive.sort(function (a, b) {
        return (b._createdAt || 0) - (a._createdAt || 0);
      });

      var changed = _hasChanged(local, alive);
      if (changed) {
        State.set('botLogs', alive);
        Store.saveBotLogs(alive);
        Events.emit(EVENTS.UI_RENDER);
        console.log('[Watchers] Bot logs synced:', alive.length, 'logs');
      }
    } catch (e) {
      console.error('[Watchers] BotLogs watcher error:', e);
    }
  }, function (err) {
    console.error('[Watchers] BotLogs listener error:', err);
  });
}

/* ===== ClearedAt Watcher (cross-device "clear all" sync) ===== */
function _watchClearedAt() {
  _db.ref(FB_PATH.CLEARED_AT).on('value', function (snap) {
    try {
      var clearedAt = snap.val();
      if (!clearedAt) return;

      var localLastClear = Store.load(STORAGE_KEYS.LAST_SYNC_TIME) || 0;
      if (clearedAt > localLastClear) {
        console.log('[Watchers] Remote clear detected, clearing local data');
        Store.clearLocalData();
        var fresh = Store.loadAll();
        State.batchSet([
          { key: 'bookings',    value: fresh.bookings    },
          { key: 'hotelConfig', value: fresh.hotelConfig },
          { key: 'botLogs',     value: fresh.botLogs     }
        ]);
        // Preserve agent list
        State.set('agentList', Store.loadAgentList());
        Events.emit(EVENTS.UI_RENDER);
        Store.save(STORAGE_KEYS.LAST_SYNC_TIME, clearedAt, false);
      }
    } catch (e) {
      console.error('[Watchers] ClearedAt watcher error:', e);
    }
  });
}

/* ===== Manual Full Download Sync ===== */
function syncDownloadAll(callback) {
  if (!isFirebaseReady()) {
    if (callback) callback({ error: 'not_ready' });
    return;
  }
  console.log('[Watchers] Starting manual download sync');

  var pending = 4;
  var results = {};

  function _done(key, data) {
    results[key] = data;
    pending--;
    if (pending === 0) {
      State.set('lastSyncTime', Date.now());
      Events.emit(EVENTS.SYNC_DOWNLOAD_DONE, results);
      console.log('[Watchers] Download sync complete');
      if (callback) callback(null, results);
    }
  }

  // Bookings
  _db.ref(FB_PATH.BOOKINGS).once('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('bookings');
      var merged = Merger.mergeBookings(local, remote);
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);
      var alive = Merger.filterAlive(merged);
      State.set('bookings', alive);
      Store.saveBookings(alive);
      _done('bookings', alive.length);
    } catch (e) {
      console.error('[Watchers] Download bookings error:', e);
      _done('bookings', 0);
    }
  });

  // Hotel config
  _db.ref(FB_PATH.HOTEL_CONFIG).once('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('hotelConfig');
      var merged = Merger.mergeHotelConfig(local, remote);
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);
      var alive = Merger.filterAlive(merged);
      State.set('hotelConfig', alive);
      Store.saveHotelConfig(alive);
      _done('hotelConfig', alive.length);
    } catch (e) {
      console.error('[Watchers] Download HC error:', e);
      _done('hotelConfig', 0);
    }
  });

  // Agent list
  _db.ref(FB_PATH.AGENT_LIST).once('value', function (snap) {
    try {
      var remoteObj = snap.val();
      var remote = [];
      if (remoteObj) {
        for (var key in remoteObj) {
          if (remoteObj.hasOwnProperty(key)) {
            remote.push(remoteObj[key]);
          }
        }
      }
      var local = State.get('agentList');
      var merged = _mergeAgentList(local, remote);
      State.set('agentList', merged);
      Store.saveAgentList(merged);
      _done('agentList', merged.length);
    } catch (e) {
      console.error('[Watchers] Download agentList error:', e);
      _done('agentList', 0);
    }
  });

  // Bot logs
  _db.ref(FB_PATH.BOT_LOGS).once('value', function (snap) {
    try {
      var remote = Utils.fbObjToArray(snap.val());
      var local = State.get('botLogs');
      var merged = Merger.mergeArray(local, remote);
      merged = Merger.cleanOldTombstones(merged, CONFIG.TOMBSTONE_TTL_MS);
      var alive = Merger.filterAlive(merged);
      alive.sort(function (a, b) {
        return (b._createdAt || 0) - (a._createdAt || 0);
      });
      State.set('botLogs', alive);
      Store.saveBotLogs(alive);
      _done('botLogs', alive.length);
    } catch (e) {
      console.error('[Watchers] Download botLogs error:', e);
      _done('botLogs', 0);
    }
  });
}

/* ===== Helper Functions ===== */

function _hasChanged(local, remote) {
  if (!local && !remote) return false;
  if (!local || !remote) return true;
  if (local.length !== remote.length) return true;
  // Quick check: compare _updatedAt sums
  var localSum = 0, remoteSum = 0;
  for (var i = 0; i < local.length; i++) {
    localSum += (local[i]._updatedAt || 0);
  }
  for (var j = 0; j < remote.length; j++) {
    remoteSum += (remote[j]._updatedAt || 0);
  }
  return localSum !== remoteSum;
}

function _mergeAgentList(local, remote) {
  local = local || [];
  remote = remote || [];
  var map = {};
  var merged = [];

  // Index local by name
  for (var i = 0; i < local.length; i++) {
    var name = local[i].name || local[i];
    map[name] = local[i];
  }

  // Merge remote (union, remote wins on conflict)
  for (var j = 0; j < remote.length; j++) {
    var rName = remote[j].name || remote[j];
    if (!map[rName]) {
      map[rName] = remote[j];
    }
  }

  for (var key in map) {
    if (map.hasOwnProperty(key)) {
      merged.push(map[key]);
    }
  }

  return merged;
}

      weekend:    data.weekend || 0,

    State.update('hotelConfig', function (list) {
      list.push(hc);
      return list;
    });
    Store.saveHotelConfig(State.get('hotelConfig'));
    syncHCToFirebase(hc);
    Events.emit(EVENTS.HC_CREATED, hc);
    return hc;
  },

  /**
   * Update a hotel config entry
   */
  update: function (fbKey, data) {
    var updated = null;
    State.update('hotelConfig', function (list) {
      for (var i = 0; i < list.length; i++) {
        if (list[i]._fbKey === fbKey) {
          for (var key in data) {
            if (data.hasOwnProperty(key) && key.charAt(0) !== '_') {
              list[i][key] = data[key];
            }
          }
          list[i]._updatedAt = Date.now();
          updated = list[i];
          break;
        }
      }
      return list;
    });

    if (updated) {
      Store.saveHotelConfig(State.get('hotelConfig'));
      syncHCToFirebase(updated);
      Events.emit(EVENTS.HC_UPDATED, updated);
    }
    return updated;
  },

  /**
   * Delete a hotel config entry
   */
  delete: function (fbKey) {
    var deleted = false;
    State.update('hotelConfig', function (list) {
      for (var i = list.length - 1; i >= 0; i--) {
        if (list[i]._fbKey === fbKey) {
          list.splice(i, 1);
          deleted = true;
          break;
        }
      }
      return list;
    });

    if (deleted) {
      Store.saveHotelConfig(State.get('hotelConfig'));
      RecentlyDeleted.track('hotelConfig', fbKey);
      removeHCFromFirebase(fbKey);
      Events.emit(EVENTS.HC_DELETED, fbKey);
    }
    return deleted;
  },

   * Get hotels by casino
   */
  getHotelsByCasino: function (casino) {
    var list = State.get('hotelConfig');
    if (!casino) return list;
    return list.filter(function (h) { return h.casino === casino; });
  },

  /**
   * Get rooms by hotel
   */
  getRoomsByHotel: function (hotel) {
    var list = State.get('hotelConfig');
    if (!hotel) return list;
    return list.filter(function (h) { return h.hotel === hotel; });
  },

  /**
   * Get rooms by casino + hotel
   */
  getRooms: function (casino, hotel) {
    var list = State.get('hotelConfig');
    return list.filter(function (h) {
      return h.casino === casino && h.hotel === hotel;
    });
  },

  /**
   * Get unique casino list (preserving order)
   */
  getCasinos: function () {
    var list = State.get('hotelConfig');
    var seen = {};
    var result = [];
    for (var i = 0; i < list.length; i++) {
      if (!seen[list[i].casino]) {
        seen[list[i].casino] = true;
        result.push(list[i].casino);
      }
    }
    return result;
  },

  /**
   * Get unique hotel list by casino
   */
  getHotelNames: function (casino) {
    var filtered = Hotels.getHotelsByCasino(casino);
    var seen = {};
    var result = [];
    for (var i = 0; i < filtered.length; i++) {
      if (!seen[filtered[i].hotel]) {
        seen[filtered[i].hotel] = true;
        result.push(filtered[i].hotel);
      }
    }
    return result;
  },

  /**
   * Get room by code
   */
  getByCode: function (code) {
    var list = State.get('hotelConfig');
    for (var i = 0; i < list.length; i++) {
      if (list[i].code === code) return list[i];
    }
    return null;
  },

  /**
   * Get all config
   */
  getAll: function () {
    return State.get('hotelConfig');
  }

 */

var Bookings = {

  /**
   * Create a new booking
   * @param {Object} data - booking fields
   * @returns {Object} the created booking
   */
  create: function (data) {
    var now = Date.now();
    var fbKey = Utils.generateFbKey();

    var booking = {
      // System fields
      _fbKey:     fbKey,
      _createdAt: now,
      _updatedAt: now,
      _source:    data._source || 'web',

      // Guest info
      guestName:     data.guestName || '',
      guestCount:    data.guestCount || 1,
      agent:         data.agent || '',
      operator:      data.operator || '',
      phone:         data.phone || '',

      // Hotel & room
      casino:        data.casino || '',
      hotel:         data.hotel || '',
      roomType:      data.roomType || '',
      roomCount:     data.roomCount || 1,
      month:         data.month || State.get('workingMonth') || Utils.getCurrentMonth(),

      // Dates & status
      checkIn:       data.checkIn || '',
      checkOut:      data.checkOut || '',
      nights:        Utils.calcNights(data.checkIn, data.checkOut),
      status:        data.status || BOOKING_STATUS.PENDING,

      // Comp & threshold
      compType:      data.compType || COMP_TYPES.FREE_ROOM,
      threshold:     data.threshold || 0,
      volume:        data.volume || 0,
      pricePerNight: data.pricePerNight || 0,
      totalCost:     0,  // calculated below

      // Transfer & notes
      transfer:       data.transfer || 'none',
      transferDetail: data.transferDetail || '',
      flightNo:       data.flightNo || '',
      specialRequest: data.specialRequest || '',
      note:           data.note || ''
    };

    // Calculate total cost
    booking.totalCost = booking.pricePerNight * booking.nights * booking.roomCount;

    // Add to state
    State.update('bookings', function (list) {
      list.push(booking);
      return list;
    });

    // Save to localStorage
    Store.saveBookings(State.get('bookings'));

    // Sync to Firebase
    syncBookingToFirebase(booking);

    // Emit event
    Events.emit(EVENTS.BOOKING_CREATED, booking);

    console.log('[Bookings] Created:', booking._fbKey, booking.guestName);
    return booking;
  },

  /**
   * Update an existing booking
   * @param {string} fbKey - booking key
   * @param {Object} data - fields to update
   * @returns {Object|null} updated booking or null if not found
   */
  update: function (fbKey, data) {
    var updated = null;

    State.update('bookings', function (list) {
      for (var i = 0; i < list.length; i++) {
        if (list[i]._fbKey === fbKey) {
          // Merge data into existing
          for (var key in data) {
            if (data.hasOwnProperty(key) && key.charAt(0) !== '_') {
              list[i][key] = data[key];
            }
          }
          // Recalculate derived fields
          list[i].nights = Utils.calcNights(list[i].checkIn, list[i].checkOut);
          list[i].totalCost = (list[i].pricePerNight || 0) * list[i].nights * (list[i].roomCount || 1);
          list[i]._updatedAt = Date.now();
          updated = list[i];
          break;
        }
      }
      return list;
    });

    if (updated) {
      Store.saveBookings(State.get('bookings'));
      syncBookingToFirebase(updated);
      Events.emit(EVENTS.BOOKING_UPDATED, updated);
      console.log('[Bookings] Updated:', fbKey);
    }

    return updated;
  },

  /**
   * Delete a booking (tombstone pattern)
   * @param {string} fbKey - booking key
   * @returns {boolean} success
   */
  delete: function (fbKey) {
    var deleted = false;

    State.update('bookings', function (list) {
      for (var i = list.length - 1; i >= 0; i--) {
        if (list[i]._fbKey === fbKey) {
          list.splice(i, 1);
          deleted = true;
          break;
        }
      }
      return list;
    });

    if (deleted) {
      Store.saveBookings(State.get('bookings'));
      // Track for anti-resurrection
      RecentlyDeleted.track('booking', fbKey);
      // Write tombstone to Firebase
      removeBookingFromFirebase(fbKey);
      Events.emit(EVENTS.BOOKING_DELETED, fbKey);
      console.log('[Bookings] Deleted:', fbKey);
    }

    return deleted;
  },

  /**
   * Update booking status only
   */
  updateStatus: function (fbKey, status) {
    return Bookings.update(fbKey, { status: status });
  },

  /**
   * Get booking by fbKey
   */
  getByKey: function (fbKey) {
    var list = State.get('bookings');
    for (var i = 0; i < list.length; i++) {
      if (list[i]._fbKey === fbKey) return list[i];
    }
    return null;
  },

  /**
   * Get bookings by month
   */
  getByMonth: function (month) {
    var list = State.get('bookings');
    if (!month) return list;
    return list.filter(function (b) {
      return b.month === month;
    });
  },

  /**
   * Get bookings by status
   */
  getByStatus: function (status) {
    var list = State.get('bookings');
    if (!status) return list;
    return list.filter(function (b) {
      return b.status === status;
    });
  },

  /**
   * Get bookings by casino
   */
  getByCasino: function (casino) {
    var list = State.get('bookings');
    if (!casino) return list;
    return list.filter(function (b) {
      return b.casino === casino;
    });
  },

  /**
   * Get bookings by agent
   */
  getByAgent: function (agent) {
    var list = State.get('bookings');
    if (!agent) return list;
    return list.filter(function (b) {
      return b.agent === agent;
    });
  },

  /**
   * Search bookings by keyword
   */
  search: function (keyword) {
    var list = State.get('bookings');
    if (!keyword) return list;
    keyword = keyword.toLowerCase();
    return list.filter(function (b) {
      return (
        (b.guestName || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.agent || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.hotel || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.roomType || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.phone || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.note || '').toLowerCase().indexOf(keyword) !== -1 ||
        (b.flightNo || '').toLowerCase().indexOf(keyword) !== -1
      );
    });
  },

  /**
   * Get all bookings
   */
  getAll: function () {
    return State.get('bookings');
  }
};

</script>

<script>
/**
 * agents.js — Agent List Management
 * Pattern: faithfully reused from v13.0.5
 */
var Agents = {

  /**
   * Add a new agent
   */
  add: function (name, phone) {
    if (!name) return null;
    // Check duplicate
    var existing = Agents.findByName(name);
    if (existing) {
      console.warn('[Agents] Duplicate name:', name);
      return existing;
    }

    var agent = {
      _fbKey:     Utils.generateFbKey(),
      _createdAt: Date.now(),
      _updatedAt: Date.now(),
      name:       name,
      phone:      phone || ''
    };

    State.update('agentList', function (list) {
      list.push(agent);
      return list;
    });
    Store.saveAgentList(State.get('agentList'));
    syncAgentListToFirebase(State.get('agentList'));
    Events.emit(EVENTS.AGENT_ADDED, agent);
    return agent;
  },

  /**
   * Rename an agent
   */
  rename: function (oldName, newName) {
    if (!oldName || !newName) return false;

    State.update('agentList', function (list) {
      for (var i = 0; i < list.length; i++) {
        if ((list[i].name || list[i]) === oldName) {
          if (typeof list[i] === 'object') {
            list[i].name = newName;
            list[i]._updatedAt = Date.now();
          } else {
            list[i] = newName;
          }
          break;
        }
      }
      return list;
    });

    Store.saveAgentList(State.get('agentList'));
    syncAgentListToFirebase(State.get('agentList'));

    // Also update bookings that reference this agent
    var bookings = Bookings.getByAgent(oldName);
    for (var j = 0; j < bookings.length; j++) {
      Bookings.update(bookings[j]._fbKey, { agent: newName });
    }

    Events.emit(EVENTS.AGENT_RENAMED, { oldName: oldName, newName: newName });
    return true;
  },

  /**
   * Remove an agent
   */
  remove: function (name) {
    var deleted = false;
    State.update('agentList', function (list) {
      for (var i = list.length - 1; i >= 0; i--) {
        if ((list[i].name || list[i]) === name) {
          list.splice(i, 1);
          deleted = true;
          break;
        }
      }
      return list;
    });

    if (deleted) {
      Store.saveAgentList(State.get('agentList'));
      syncAgentListToFirebase(State.get('agentList'));
      Events.emit(EVENTS.AGENT_REMOVED, name);
    }
    return deleted;
  },

  /**
   * Find agent by name
   */
  findByName: function (name) {
    var list = State.get('agentList');
    for (var i = 0; i < list.length; i++) {
      if ((list[i].name || list[i]) === name) return list[i];
    }
    return null;
  },

  /**
   * Get all agent names
   */
  getNames: function () {
    var list = State.get('agentList');
    return list.map(function (a) { return a.name || a; });
  },

  /**
   * Get all agents
   */
  getAll: function () {
    return State.get('agentList');
  }
};

</script>

<script>
/**
 * backup.js — Backup & Restore
 * Pattern: faithfully reused from v13.0.5 data/backup.js
 */
var Backup = {

  /**
   * Create a backup snapshot
   */
  create: function (label) {
    var now = new Date();
    var timestamp = now.getTime();
    var dateStr = Utils.formatDate(now) + ' ' + Utils.pad(now.getHours()) + ':' + Utils.pad(now.getMinutes());

    var snapshot = {
      id: timestamp,
      label: label || ('備份 ' + dateStr),
      timestamp: timestamp,
      version: APP.VERSION,
      data: {
        bookings: State.get('bookings'),
        hotelConfig: State.get('hotelConfig'),
        agentList: State.get('agentList'),
        botLogs: State.get('botLogs'),
        workingMonth: State.get('workingMonth')
      }
    };

    // Save to localStorage
    var backups = Store.load(STORAGE_KEYS.BACKUP_LIST, true) || [];
    backups.push({ id: timestamp, label: snapshot.label, timestamp: timestamp });
    Store.save(STORAGE_KEYS.BACKUP_LIST, backups, true);
    Store.save(STORAGE_KEYS.BACKUP_PREFIX + timestamp, snapshot, true);
    Store.save(STORAGE_KEYS.LAST_BACKUP_DATE, dateStr, false);

    return snapshot;
  },

  /**
   * Restore from a backup
   */
  restore: function (backupId) {
    var snapshot = Store.load(STORAGE_KEYS.BACKUP_PREFIX + backupId, true);
    if (!snapshot || !snapshot.data) {
      console.error('[Backup] Restore failed: snapshot not found');
      return false;
    }

    var d = snapshot.data;
    State.batchSet([
      { key: 'bookings',    value: d.bookings    || [] },
      { key: 'hotelConfig', value: d.hotelConfig || [] },
      { key: 'agentList',   value: d.agentList   || [] },
      { key: 'botLogs',     value: d.botLogs     || [] },
      { key: 'workingMonth',value: d.workingMonth|| null }
    ]);

    Store.saveAll();
    Events.emit(EVENTS.UI_RENDER);
    return true;
  },

  /**
   * List all backups
   */
  list: function () {
    return Store.load(STORAGE_KEYS.BACKUP_LIST, true) || [];
  },

  /**
   * Delete a backup
   */
  remove: function (backupId) {
    var backups = Backup.list();
    var filtered = backups.filter(function (b) { return b.id !== backupId; });
    Store.save(STORAGE_KEYS.BACKUP_LIST, filtered, true);
    Store.remove(STORAGE_KEYS.BACKUP_PREFIX + backupId);
    return true;
  },

  /**
   * Export as JSON file
   */
  exportJSON: function () {
    var snapshot = Backup.create('Export ' + Utils.formatDate(new Date()));
    var json = JSON.stringify(snapshot, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'booking-backup-' + Utils.formatDate(new Date()) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  /**
   * Import from JSON file
   */
  importJSON: function (file, callback) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var snapshot = JSON.parse(e.target.result);
        if (!snapshot.data) {
          callback(false, 'Invalid backup format');
          return;
        }
        var d = snapshot.data;
        State.batchSet([
          { key: 'bookings',    value: d.bookings    || [] },
          { key: 'hotelConfig', value: d.hotelConfig || [] },
          { key: 'agentList',   value: d.agentList   || [] },
          { key: 'botLogs',     value: d.botLogs     || [] }
        ]);
        Store.saveAll();
        Events.emit(EVENTS.UI_RENDER);
        if (callback) callback(true);
      } catch (err) {
        console.error('[Backup] Import failed:', err);
        if (callback) callback(false, err.message);
      }
    };
    reader.readAsText(file);
  }
};

</script>

<script>
/**
 * filters.js — Pure Functions for Filtering & Sorting
 * Pattern: faithfully reused from v13.0.5 calc/filters.js
 * Zero side effects, 100% testable
 */
var Filters = {

  /**
   * Filter bookings by criteria
   * @param {Array} bookings - booking array
   * @param {Object} criteria - { month, casino, hotel, agent, status, keyword, dateFrom, dateTo }
   * @returns {Array} filtered bookings
   */
  filterBookings: function (bookings, criteria) {
    if (!bookings) return [];
    if (!criteria) return bookings;

    return bookings.filter(function (b) {
      if (criteria.month && b.month !== criteria.month) return false;
      if (criteria.casino && b.casino !== criteria.casino) return false;
      if (criteria.hotel && b.hotel !== criteria.hotel) return false;
      if (criteria.agent && b.agent !== criteria.agent) return false;
      if (criteria.status && b.status !== criteria.status) return false;
      if (criteria.compType && b.compType !== criteria.compType) return false;

      if (criteria.dateFrom && b.checkIn < criteria.dateFrom) return false;
      if (criteria.dateTo && b.checkOut > criteria.dateTo) return false;

      if (criteria.keyword) {
        var kw = criteria.keyword.toLowerCase();
        var match = (
          (b.guestName || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.agent || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.hotel || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.roomType || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.phone || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.note || '').toLowerCase().indexOf(kw) !== -1 ||
          (b.flightNo || '').toLowerCase().indexOf(kw) !== -1
        );
        if (!match) return false;
      }

      return true;
    });
  },

  /**
   * Sort bookings by field
   * @param {Array} bookings - booking array
   * @param {string} field - sort field
   * @param {boolean} ascending - sort direction
   * @returns {Array} sorted bookings (new array)
   */
  sortBookings: function (bookings, field, ascending) {
    if (!bookings) return [];
    var arr = bookings.slice();
    ascending = ascending !== false;

    arr.sort(function (a, b) {
      var aVal = a[field];
      var bVal = b[field];

      // Handle undefined/null
      if (aVal === undefined || aVal === null) aVal = '';
      if (bVal === undefined || bVal === null) bVal = '';

      // Numeric comparison
      if (typeof aVal === 'number' && typeof bVal === 'number') {
        return ascending ? aVal - bVal : bVal - aVal;
      }

      // String comparison
      var aStr = String(aVal);
      var bStr = String(bVal);
      if (aStr < bStr) return ascending ? -1 : 1;
      if (aStr > bStr) return ascending ? 1 : -1;
      return 0;
    });

    return arr;
  },

  /**
   * Get bookings overlapping a date range
   */
  filterByDateRange: function (bookings, dateFrom, dateTo) {
    if (!bookings) return [];
    return bookings.filter(function (b) {
      if (!b.checkIn || !b.checkOut) return false;
      // Overlap: checkIn <= dateTo && checkOut >= dateFrom
      return b.checkIn <= dateTo && b.checkOut >= dateFrom;
    });
  },

  /**
   * Get bookings for a specific date (check-in or staying)
   */
  filterByDate: function (bookings, date) {
    if (!bookings || !date) return [];
    return bookings.filter(function (b) {
      if (!b.checkIn || !b.checkOut) return false;
      return b.checkIn <= date && b.checkOut > date;
    });
  },

  /**
   * Paginate results
   */
  paginate: function (arr, page, perPage) {
    if (!arr) return [];
    page = page || 1;
    perPage = perPage || 20;
    var start = (page - 1) * perPage;
    return arr.slice(start, start + perPage);
  },

  /**
   * Group bookings by field
   */
  groupBy: function (bookings, field) {
    if (!bookings) return {};
    var groups = {};
    for (var i = 0; i < bookings.length; i++) {
      var key = bookings[i][field] || '未分類';
      if (!groups[key]) groups[key] = [];
      groups[key].push(bookings[i]);
    }
    return groups;
  }
};

</script>

<script>
/**
 * stats.js — Pure Functions for Statistics
 * Pattern: faithfully reused from v13.0.5 calc/stats.js
 * Zero side effects, 100% testable
 */
var Stats = {

  /**
   * Calculate total bookings count
   */
  totalBookings: function (bookings) {
    return bookings ? bookings.length : 0;
  },

  /**
   * Calculate total room nights
   */
  totalRoomNights: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].nights || 0) * (bookings[i].roomCount || 1);
    }
    return sum;
  },

  /**
   * Calculate total rooms
   */
  totalRooms: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].roomCount || 1);
    }
    return sum;
  },

  /**
   * Calculate total guests
   */
  totalGuests: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].guestCount || 1);
    }
    return sum;
  },

  /**
   * Calculate total threshold (洗碼門檻)
   */
  totalThreshold: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].threshold || 0) * (bookings[i].roomCount || 1);
    }
    return sum;
  },

  /**
   * Calculate total volume (洗碼量)
   */
  totalVolume: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].volume || 0);
    }
    return sum;
  },

  /**
   * Calculate threshold fulfillment rate
   */
  thresholdRate: function (bookings) {
    var threshold = Stats.totalThreshold(bookings);
    var volume = Stats.totalVolume(bookings);
    if (threshold === 0) return 0;
    return (volume / threshold) * 100;
  },

  /**
   * Calculate total cost
   */
  totalCost: function (bookings) {
    if (!bookings) return 0;
    var sum = 0;
    for (var i = 0; i < bookings.length; i++) {
      sum += (bookings[i].totalCost || 0);
    }
    return sum;
  },

  /**
   * Count bookings by status
   */
  countByStatus: function (bookings) {
    var counts = {};
    if (!bookings) return counts;
    for (var i = 0; i < bookings.length; i++) {
      var s = bookings[i].status || 'unknown';
      counts[s] = (counts[s] || 0) + 1;
    }
    return counts;
  },

  /**
   * Count bookings by casino
   */
  countByCasino: function (bookings) {
    var counts = {};
    if (!bookings) return counts;
    for (var i = 0; i < bookings.length; i++) {
      var c = bookings[i].casino || '未分類';
      counts[c] = (counts[c] || 0) + 1;
    }
    return counts;
  },

  /**
   * Count bookings by agent
   */
  countByAgent: function (bookings) {
    var counts = {};
    if (!bookings) return counts;
    for (var i = 0; i < bookings.length; i++) {
      var a = bookings[i].agent || '未分類';
      counts[a] = (counts[a] || 0) + 1;
    }
    return counts;
  },

  /**
   * Summary by casino (matrix: casino × status)
   */
  casinoMatrix: function (bookings) {
    var matrix = {};
    if (!bookings) return matrix;
    for (var i = 0; i < bookings.length; i++) {
      var casino = bookings[i].casino || '未分類';
      var status = bookings[i].status || 'unknown';
      if (!matrix[casino]) matrix[casino] = {};
      matrix[casino][status] = (matrix[casino][status] || 0) + 1;
      matrix[casino]._total = (matrix[casino]._total || 0) + 1;
    }
    return matrix;
  },

  /**
   * Summary by agent (matrix: agent × casino)
   */
  agentMatrix: function (bookings) {
    var matrix = {};
    if (!bookings) return matrix;
    for (var i = 0; i < bookings.length; i++) {
      var agent = bookings[i].agent || '未分類';
      var casino = bookings[i].casino || '未分類';
      if (!matrix[agent]) matrix[agent] = {};
      matrix[agent][casino] = (matrix[agent][casino] || 0) + 1;
      matrix[agent]._total = (matrix[agent]._total || 0) + 1;
    }
    return matrix;
  },

  /**
   * Daily booking count for a month
   */
  dailyCounts: function (bookings, month) {
    var days = {};
    if (!bookings) return days;
    for (var i = 0; i < bookings.length; i++) {
      if (bookings[i].month !== month) continue;
      var dateRange = Utils.dateRange(bookings[i].checkIn, bookings[i].checkOut);
      for (var j = 0; j < dateRange.length; j++) {
        days[dateRange[j]] = (days[dateRange[j]] || 0) + 1;
      }
    }
    return days;
  },

  /**
   * Transfer statistics
   */
  transferStats: function (bookings) {
    var stats = { none: 0, airport: 0, ferry: 0, both: 0, custom: 0 };
    if (!bookings) return stats;
    for (var i = 0; i < bookings.length; i++) {
      var t = bookings[i].transfer || 'none';
      stats[t] = (stats[t] || 0) + 1;
    }
    return stats;
  },

  /**
   * Top agents by booking count
   */
  topAgents: function (bookings, limit) {
    var counts = Stats.countByAgent(bookings);
    var arr = [];
    for (var name in counts) {
      arr.push({ agent: name, count: counts[name] });
    }
    arr.sort(function (a, b) { return b.count - a.count; });
    if (limit) arr = arr.slice(0, limit);
    return arr;
  },

  /**
   * Top casinos by booking count
   */
  topCasinos: function (bookings, limit) {
    var counts = Stats.countByCasino(bookings);
    var arr = [];
    for (var name in counts) {
      arr.push({ casino: name, count: counts[name] });
    }
    arr.sort(function (a, b) { return b.count - a.count; });
    if (limit) arr = arr.slice(0, limit);
    return arr;
  }
};

</script>

<script>
/**
 * keyboard.js — Keyboard Shortcuts Manager
 * Booking System v1.0.0
 * Pattern: reused from v13.0.5
 */
var Keyboard = (function () {
  var _initialized = false;
  var _helpModalOpen = false;

  function init() {
    if (_initialized) return;
    _initialized = true;

    document.addEventListener('keydown', _handleKeyDown);
    console.log('[Keyboard] Shortcuts initialized');
  }

  function _handleKeyDown(e) {
    // Don't intercept when typing in input/textarea/select
    var tag = e.target.tagName.toLowerCase();
    var isInput = tag === 'input' || tag === 'textarea' || tag === 'select';

    // Ctrl+S and Ctrl+N work even in inputs
    if (e.ctrlKey || e.metaKey) {
      switch (e.key.toLowerCase()) {
        case '1':
          e.preventDefault();
          Router.switchTo(PAGES.OVERVIEW);
          break;
        case '2':
          e.preventDefault();
          Router.switchTo(PAGES.CALENDAR);
          break;
        case '3':
          e.preventDefault();
          Router.switchTo(PAGES.BOOKING_LIST);
          break;
        case '4':
          e.preventDefault();
          Router.switchTo(PAGES.STATS);
          break;
        case '5':
          e.preventDefault();
          Router.switchTo(PAGES.BOT_LOG);
          break;
        case 'n':
          e.preventDefault();
          _openBookingModal();
          break;
        case 's':
          e.preventDefault();
          _triggerSync();
          break;
        case 'f':
          if (!isInput) {
            e.preventDefault();
            _focusSearch();
          }
          break;
      }
      return;
    }

    // Non-ctrl shortcuts (only when not typing)
    if (isInput) return;

    switch (e.key) {
      case '?':
        e.preventDefault();
        _toggleHelpModal();
        break;
      case 'Escape':
        _closeAllModals();
        break;
    }
  }

  function _openBookingModal() {
    if (typeof openBookingModal === 'function') {
      openBookingModal();
    } else {
      Events.emit(EVENTS.UI_MODAL_OPEN, { type: 'booking' });
    }
  }

  function _triggerSync() {
    if (typeof syncUploadAll === 'function') {
      syncUploadAll(function () {
        if (typeof showToast === 'function') {
          showToast('同步完成', 'success');
        }
      });
    }
  }

  function _focusSearch() {
    var searchInput = document.querySelector('.search-box input');
    if (searchInput) {
      searchInput.focus();
      searchInput.select();
    }
  }

  function _toggleHelpModal() {
    var modal = document.getElementById('shortcut-help-modal');
    if (!modal) {
      _createHelpModal();
      modal = document.getElementById('shortcut-help-modal');
    }
    if (_helpModalOpen) {
      _closeHelpModal();
    } else {
      _openHelpModal();
    }
  }

  function _createHelpModal() {
    var overlay = document.createElement('div');
    overlay.id = 'shortcut-help-modal';
    overlay.className = 'modal-overlay';

    var items = SHORTCUTS.map(function (s) {
      return '<div class="shortcut-item">' +
        '<span class="shortcut-action">' + s.action + '</span>' +
        '<span class="shortcut-key">' + s.keys + '</span>' +
        '</div>';
    }).join('');

    overlay.innerHTML =
      '<div class="modal modal-sm">' +
      '  <div class="modal-header">' +
      '    <h3>快捷鍵一覽</h3>' +
      '    <button class="modal-close" onclick="Keyboard.closeHelp()">' +
      '      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>' +
      '    </button>' +
      '  </div>' +
      '  <div class="modal-body">' +
      '    <div class="shortcut-list">' + items + '</div>' +
      '  </div>' +
      '</div>';

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) _closeHelpModal();
    });

    document.body.appendChild(overlay);
  }

  function _openHelpModal() {
    var modal = document.getElementById('shortcut-help-modal');
    if (modal) {
      modal.classList.add('visible');
      _helpModalOpen = true;
    }
  }

  function _closeHelpModal() {
    var modal = document.getElementById('shortcut-help-modal');
    if (modal) {
      modal.classList.remove('visible');
      _helpModalOpen = false;
    }
  }

  function _closeAllModals() {
    // Close help modal
    _closeHelpModal();

    // Close any open modal-overlay
    var modals = document.querySelectorAll('.modal-overlay.visible');
    for (var i = 0; i < modals.length; i++) {
      modals[i].classList.remove('visible');
    }

    // Close sidebar on mobile
    var sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.remove('open');

    var backdrop = document.getElementById('sidebar-backdrop');
    if (backdrop) backdrop.classList.remove('visible');

    Events.emit(EVENTS.UI_MODAL_CLOSE);
  }

  return {
    init: init,
    closeHelp: _closeHelpModal
  };
})();

</script>

<script>
/**
 * toast.js — Toast Notification System
 * Booking System v1.0.0
 * Pattern: reused from v13.0.5
 * Types: success / error / warning / info
 */
var Toast = (function () {
  var _container = null;
  var _toastCount = 0;
  var MAX_TOASTS = 5;
  var DEFAULT_DURATION = 3000;

  function _ensureContainer() {
    if (_container) return _container;
    _container = document.getElementById('toast-container');
    if (!_container) {
      _container = document.createElement('div');
      _container.id = 'toast-container';
      document.body.appendChild(_container);
    }
    return _container;
  }

  function _getIcon(type) {
    var icons = {
      success: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>',
      error: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>',
      warning: '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>',
      info: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>'
    };
    return icons[type] || icons.info;
  }

  function show(message, type, duration) {
    type = type || 'info';
    duration = duration || DEFAULT_DURATION;

    var container = _ensureContainer();

    // Limit number of toasts
    while (container.children.length >= MAX_TOASTS) {
      container.removeChild(container.firstChild);
    }

    // Create toast element
    var toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    toast.innerHTML =
      '<div class="toast-icon">' +
      '  <svg viewBox="0 0 24 24">' + _getIcon(type) + '</svg>' +
      '</div>' +
      '<div class="toast-message">' + Utils.escapeHtml(message) + '</div>';

    container.appendChild(toast);
    _toastCount++;

    // Auto dismiss
    var timer = setTimeout(function () {
      _dismiss(toast);
    }, duration);

    // Click to dismiss
    toast.addEventListener('click', function () {
      clearTimeout(timer);
      _dismiss(toast);
    });

    return toast;
  }

  function _dismiss(toast) {
    if (!toast || !toast.parentNode) return;
    toast.classList.add('toast-out');
    setTimeout(function () {
      if (toast.parentNode) {
        toast.parentNode.removeChild(toast);
      }
    }, 300);
  }

  function success(message, duration) {
    return show(message, 'success', duration);
  }

  function error(message, duration) {
    return show(message, 'error', duration || 5000);
  }

  function warning(message, duration) {
    return show(message, 'warning', duration);
  }

  function info(message, duration) {
    return show(message, 'info', duration);
  }

  function clear() {
    var container = _ensureContainer();
    while (container.firstChild) {
      container.removeChild(container.firstChild);
    }
  }

  return {
    show: show,
    success: success,
    error: error,
    warning: warning,
    info: info,
    clear: clear
  };
})();

// Global alias for convenience
function showToast(message, type, duration) {
  Toast.show(message, type, duration);
}

</script>

<script>
/**
 * modal.js — Modal Dialog System
 * Booking System v1.0.0
 * Pattern: reused from v13.0.5
 * Features: open/close, form hosting, backdrop click, escape
 */
var Modal = (function () {
  var _activeModal = null;

  /**
   * Open a modal with given HTML content
   * @param {Object} opts - { title, body, footer, size, onClose }
   */
  function open(opts) {
    opts = opts || {};

    // Close any existing modal first
    close();

    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';

    var sizeClass = opts.size === 'lg' ? ' modal-lg' :
                    opts.size === 'sm' ? ' modal-sm' : '';

    overlay.innerHTML =
      '<div class="modal' + sizeClass + '">' +
      '  <div class="modal-header">' +
      '    <h3>' + Utils.escapeHtml(opts.title || '') + '</h3>' +
      '    <button class="modal-close" data-modal-close>' +
      '      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>' +
      '    </button>' +
      '  </div>' +
      '  <div class="modal-body">' + (opts.body || '') + '</div>' +
      (opts.footer ? '<div class="modal-footer">' + opts.footer + '</div>' : '') +
      '</div>';

    document.body.appendChild(overlay);
    _activeModal = { el: overlay, onClose: opts.onClose };

    // Trigger animation
    requestAnimationFrame(function () {
      overlay.classList.add('visible');
    });

    // Close handlers
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay || e.target.closest('[data-modal-close]')) {
        close();
      }
    });

    Events.emit(EVENTS.UI_MODAL_OPEN, { title: opts.title });
    return overlay;
  }

  /**
   * Close the active modal
   */
  function close() {
    if (!_activeModal) return;
    var overlay = _activeModal.el;
    var onClose = _activeModal.onClose;

    overlay.classList.remove('visible');
    setTimeout(function () {
      if (overlay.parentNode) {
        overlay.parentNode.removeChild(overlay);
      }
    }, 200);

    _activeModal = null;

    if (typeof onClose === 'function') {
      try { onClose(); } catch (e) { console.error('[Modal] onClose error:', e); }
    }

    Events.emit(EVENTS.UI_MODAL_CLOSE);
  }

  /**
   * Update modal body content
   */
  function setBody(html) {
    if (!_activeModal) return;
    var body = _activeModal.el.querySelector('.modal-body');
    if (body) body.innerHTML = html;
  }

  /**
   * Update modal footer content
   */
  function setFooter(html) {
    if (!_activeModal) return;
    var footer = _activeModal.el.querySelector('.modal-footer');
    if (footer) {
      footer.innerHTML = html;
    } else {
      var modal = _activeModal.el.querySelector('.modal');
      footer = document.createElement('div');
      footer.className = 'modal-footer';
      footer.innerHTML = html;
      modal.appendChild(footer);
    }
  }

  /**
   * Check if a modal is currently open
   */
  function isOpen() {
    return _activeModal !== null;
  }

  /**
   * Confirm dialog (promise-free, callback-based)
   */
  function confirm(message, onConfirm, opts) {
    opts = opts || {};
    open({
      title: opts.title || '確認',
      size: 'sm',
      body: '<p style="font-size:var(--fs-md);color:var(--text-secondary);padding:var(--sp-2) 0;">' +
            Utils.escapeHtml(message) + '</p>',
      footer:
        '<button class="btn btn-secondary" data-modal-close>取消</button>' +
        '<button class="btn btn-danger" id="modal-confirm-btn">' +
        Utils.escapeHtml(opts.confirmText || '確認') + '</button>'
    });

    var btn = document.getElementById('modal-confirm-btn');
    if (btn) {
      btn.addEventListener('click', function () {
        close();
        if (typeof onConfirm === 'function') onConfirm();
      });
    }
  }

  return {
    open: open,
    close: close,
    setBody: setBody,
    setFooter: setFooter,
    isOpen: isOpen,
    confirm: confirm
  };
})();

// Global aliases
function closeModal() { Modal.close(); }

</script>

<script>
/**
 * overview.js — Overview / Dashboard Page
 * Booking System v1.0.0
 * Renders: KPI cards + recent bookings + status distribution
 */
var OverviewPage = (function () {

  function render() {
    var container = document.getElementById('page-overview');
    if (!container) return;

    var month = State.get('workingMonth') || Utils.getCurrentMonth();
    var allBookings = Bookings.getAll();
    var monthBookings = Filters.filterBookings(allBookings, { month: month });

    // Calculate stats
    var total = Stats.totalBookings(monthBookings);
    var totalRooms = Stats.totalRooms(monthBookings);
    var totalNights = Stats.totalRoomNights(monthBookings);
    var totalGuests = Stats.totalGuests(monthBookings);
    var totalThreshold = Stats.totalThreshold(monthBookings);
    var totalVolume = Stats.totalVolume(monthBookings);
    var thresholdRate = Stats.thresholdRate(monthBookings);
    var statusCounts = Stats.countByStatus(monthBookings);

    // Status counts
    var pending = statusCounts['pending'] || 0;
    var confirmed = statusCounts['confirmed'] || 0;
    var checkedIn = statusCounts['checked-in'] || 0;
    var checkedOut = statusCounts['checked-out'] || 0;
    var cancelled = statusCounts['cancelled'] || 0;

    var html = '';

    // Page header
    html += '<div class="page-header">';
    html += '  <h3>總覽</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-primary" onclick="openBookingModal()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>';
    html += '      新增訂房';
    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    // KPI Cards
    html += '<div class="kpi-grid">';

    // Total bookings
    html += _kpiCard('kpi-cyan', '本月訂房數', total, '間', '本月所有訂房記錄',
      '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>');

    // Total rooms
    html += _kpiCard('kpi-violet', '總房間數', totalRooms, '間', '所有訂房房間總和',
      '<svg viewBox="0 0 24 24"><path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/></svg>');

    // Total nights
    html += _kpiCard('kpi-gold', '總房晚數', totalNights, '晚', '房間數 × 晚數',
      '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>');

    // Threshold rate
    var rateClass = thresholdRate >= 100 ? 'kpi-success' : 'kpi-danger';
    html += _kpiCard(rateClass, '門檻達成率', thresholdRate.toFixed(1), '%',
      '洗碼量 / 門檻 × 100%',
      '<svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>');

    html += '</div>';

    // Second row: status distribution + recent bookings
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);margin-bottom:var(--sp-6);">';

    // Status distribution card
    html += '<div class="card">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg></div>';
    html += '    狀態分佈';
    html += '  </div>';
    html += _statusRow('待確認', pending, total, UI_COLORS.warning);
    html += _statusRow('已確認', confirmed, total, UI_COLORS.techCyan);
    html += _statusRow('已入住', checkedIn, total, UI_COLORS.success);
    html += _statusRow('已退房', checkedOut, total, UI_COLORS.textMuted);
    html += _statusRow('已取消', cancelled, total, UI_COLORS.danger);
    html += '</div>';

    // Recent bookings card
    html += '<div class="card">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>';
    html += '    最近訂房';
    html += '  </div>';

    var recent = Filters.sortBookings(monthBookings, '_createdAt', false).slice(0, 5);
    if (recent.length === 0) {
      html += _emptyStateMini('暫無訂房記錄');
    } else {
      for (var i = 0; i < recent.length; i++) {
        html += _recentBookingRow(recent[i]);
      }
    }
    html += '</div>';

    html += '</div>'; // end grid

    // Volume vs Threshold section
    if (totalThreshold > 0 || totalVolume > 0) {
      html += '<div class="card">';
      html += '  <div class="card-title">';
      html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg></div>';
      html += '    洗碼量 vs 門檻';
      html += '  </div>';
      html += _progressRow('總洗碼量', totalVolume, totalThreshold, Utils.formatNumber(totalVolume), Utils.formatNumber(totalThreshold));
      html += '</div>';
    }

    container.innerHTML = html;
  }

  function _kpiCard(colorClass, label, value, unit, sub, iconSvg) {
    var html = '<div class="kpi-card ' + colorClass + '">';
    html += '  <div class="kpi-header">';
    html += '    <span class="kpi-label">' + label + '</span>';
    html += '    <div class="kpi-icon">' + iconSvg + '</div>';
    html += '  </div>';
    html += '  <div class="kpi-value tabular-nums">' + value + '</div>';
    if (unit) html += '  <span class="kpi-sub">' + unit + ' — ' + Utils.escapeHtml(sub) + '</span>';
    html += '</div>';
    return html;
  }

  function _statusRow(label, count, total, color) {
    var pct = total > 0 ? (count / total * 100) : 0;
    var html = '<div class="stat-row">';
    html += '  <span class="stat-label" style="display:flex;align-items:center;gap:6px;">';
    html += '    <span style="width:8px;height:8px;border-radius:50%;background:' + color + ';"></span>';
    html += '    ' + Utils.escapeHtml(label);
    html += '  </span>';
    html += '  <span class="stat-value">' + count + ' <span style="color:var(--text-muted);font-weight:400;font-size:var(--fs-xs);">(' + pct.toFixed(0) + '%)</span></span>';
    html += '</div>';
    return html;
  }

  function _recentBookingRow(b) {
    var html = '<div class="stat-row" style="cursor:pointer;" onclick="viewBookingDetail(\'' + b._fbKey + '\')">';
    html += '  <div>';
    html += '    <div style="font-weight:600;font-size:var(--fs-sm);">' + Utils.escapeHtml(b.guestName || '未知') + '</div>';
    html += '    <div style="font-size:var(--fs-xs);color:var(--text-muted);">' + Utils.escapeHtml(b.casino + ' / ' + (b.hotel || '')) + '</div>';
    html += '  </div>';
    html += '  <div style="text-align:right;">';
    html += '    ' + Utils.statusBadge(b.status);
    html += '    <div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px;">' + Utils.formatDateDisplay(b.checkIn) + '</div>';
    html += '  </div>';
    html += '</div>';
    return html;
  }

  function _progressRow(label, current, target, currentStr, targetStr) {
    var pct = target > 0 ? Math.min(100, (current / target * 100)) : 0;
    var fillClass = pct >= 100 ? 'success' : pct >= 50 ? '' : 'warning';
    var html = '<div style="margin-bottom:var(--sp-4);">';
    html += '  <div style="display:flex;justify-content:space-between;margin-bottom:var(--sp-2);">';
    html += '    <span class="stat-label">' + Utils.escapeHtml(label) + '</span>';
    html += '    <span class="stat-value">' + currentStr + ' / ' + targetStr + '</span>';
    html += '  </div>';
    html += '  <div class="progress-bar"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%;"></div></div>';
    html += '</div>';
    return html;
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' +
           Utils.escapeHtml(text) + '</div>';
  }

  return { render: render };
})();

// Global alias
function renderOverview() { OverviewPage.render(); }

</script>

<script>
/**
 * calendar.js — Calendar View Page
 * Booking System v1.0.0
 * Renders: Monthly calendar with booking chips on each day
 */
var CalendarPage = (function () {

  function render() {
    var container = document.getElementById('page-calendar');
    if (!container) return;

    var monthStr = State.get('workingMonth') || Utils.getCurrentMonth();
    var parts = monthStr.split('-');
    var year = parseInt(parts[0], 10);
    var month = parseInt(parts[1], 10) - 1; // 0-indexed

    var allBookings = Bookings.getAll();
    var monthBookings = Filters.filterBookings(allBookings, { month: monthStr });

    var html = '';

    // Page header
    html += '<div class="page-header">';
    html += '  <h3>日曆視圖 — ' + monthStr + '</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-secondary" onclick="prevMonth()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
    html += '      上月';
    html += '    </button>';
    html += '    <button class="btn btn-secondary" onclick="nextMonth()">下月';
    html += '      <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';
    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    // Calendar grid
    html += '<div class="calendar-grid">';

    // Day headers
    var dayNames = ['日', '一', '二', '三', '四', '五', '六'];
    for (var d = 0; d < 7; d++) {
      var weekendClass = (d === 0 || d === 6) ? ' weekend' : '';
      html += '<div class="calendar-header-cell' + weekendClass + '">' + dayNames[d] + '</div>';
    }

    // Calculate first day of month and total days
    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = Utils.getMonthDays(year, month);

    // Today
    var todayStr = Utils.formatDate(new Date());

    // Build day cells
    // Previous month padding
    var prevMonthDays = Utils.getMonthDays(year, month - 1);
    for (var p = firstDay - 1; p >= 0; p--) {
      var prevDay = prevMonthDays - p;
      html += '<div class="calendar-cell other-month"><span class="calendar-day-num">' + prevDay + '</span></div>';
    }

    // Current month days
    for (var day = 1; day <= daysInMonth; day++) {
      var dateStr = year + '-' + Utils.pad(month + 1) + '-' + Utils.pad(day);
      var dow = new Date(year, month, day).getDay();
      var isWeekend = (dow === 0 || dow === 6);
      var isToday = (dateStr === todayStr);

      var classes = 'calendar-cell';
      if (isWeekend) classes += ' weekend';
      if (isToday) classes += ' today';

      html += '<div class="' + classes + '" onclick="openBookingModal(\'' + dateStr + '\')">';
      html += '<span class="calendar-day-num">' + day + '</span>';

      // Find bookings for this date
      var dayBookings = Filters.filterByDate(monthBookings, dateStr);
      for (var b = 0; b < Math.min(dayBookings.length, 3); b++) {
        var bk = dayBookings[b];
        var chipText = Utils.escapeHtml(bk.guestName || bk.hotel || '訂房');
        html += '<div class="calendar-booking-chip status-' + bk.status + '" onclick="event.stopPropagation();viewBookingDetail(\'' + bk._fbKey + '\')" title="' + Utils.escapeHtml(bk.guestName + ' / ' + bk.hotel) + '">';
        html += chipText;
        html += '</div>';
      }
      if (dayBookings.length > 3) {
        html += '<div class="calendar-booking-chip" style="color:var(--text-muted);">+' + (dayBookings.length - 3) + '</div>';
      }

      html += '</div>';
    }

    // Next month padding
    var totalCells = firstDay + daysInMonth;
    var remaining = (7 - (totalCells % 7)) % 7;
    for (var n = 1; n <= remaining; n++) {
      html += '<div class="calendar-cell other-month"><span class="calendar-day-num">' + n + '</span></div>';
    }

    html += '</div>';

    // Legend
    html += '<div style="display:flex;gap:var(--sp-4);margin-top:var(--sp-4);flex-wrap:wrap;">';
    html += _legendItem('pending', '待確認');
    html += _legendItem('confirmed', '已確認');
    html += _legendItem('checked-in', '已入住');
    html += _legendItem('checked-out', '已退房');
    html += _legendItem('cancelled', '已取消');
    html += '</div>';

    container.innerHTML = html;
  }

  function _legendItem(status, label) {
    return '<div style="display:flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--text-secondary);">' +
           '<span class="calendar-booking-chip status-' + status + '" style="width:20px;height:12px;padding:0;"></span>' +
           Utils.escapeHtml(label) +
           '</div>';
  }

  return { render: render };
})();

// Global alias
function renderCalendar() { CalendarPage.render(); }

</script>

<!-- ===== src/pages/booking-list.js ===== -->
<script>
/**
 * booking-list.js — Booking List Page
 * Booking System v1.0.0
 * Renders: Filterable table with search, sort, pagination
 */
var BookingListPage = (function () {

  var _currentPage = 1;
  var _perPage = 20;
  var _sortField = '_createdAt';
  var _sortAsc = false;
  var _filterState = {};

  function render() {
    var container = document.getElementById('page-booking-list');
    if (!container) return;

    var html = '';

    // Page header
    html += '<div class="page-header">';
    html += '  <h3>訂房列表</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-primary" onclick="openBookingModal()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>';
    html += '      新增訂房';
    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    // Filter bar
    html += '<div class="filter-bar">';
    html += '  <div class="filter-item">';
    html += '    <label>體系</label>';
    html += '    <select id="bl-filter-casino" onchange="BookingListPage.onFilterChange()">';
    html += '      <option value="">全部</option>';
    var casinos = Hotels.getCasinos();
    for (var i = 0; i < casinos.length; i++) {
      html += '      <option value="' + Utils.escapeHtml(casinos[i]) + '">' + Utils.escapeHtml(casinos[i]) + '</option>';
    }
    html += '    </select>';
    html += '  </div>';

    html += '  <div class="filter-item">';
    html += '    <label>狀態</label>';
    html += '    <select id="bl-filter-status" onchange="BookingListPage.onFilterChange()">';
    html += '      <option value="">全部</option>';
    html += '      <option value="pending">待確認</option>';
    html += '      <option value="confirmed">已確認</option>';
    html += '      <option value="checked-in">已入住</option>';
    html += '      <option value="checked-out">已退房</option>';
    html += '      <option value="cancelled">已取消</option>';
    html += '    </select>';
    html += '  </div>';

    html += '  <div class="filter-item">';
    html += '    <label>代理</label>';
    html += '    <select id="bl-filter-agent" onchange="BookingListPage.onFilterChange()">';
    html += '      <option value="">全部</option>';
    var agentNames = Agents.getNames();
    for (var a = 0; a < agentNames.length; a++) {
      html += '      <option value="' + Utils.escapeHtml(agentNames[a]) + '">' + Utils.escapeHtml(agentNames[a]) + '</option>';
    }
    html += '    </select>';
    html += '  </div>';

    html += '  <div class="filter-spacer"></div>';

    html += '  <div class="search-box" style="width:220px;">';
    html += '    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>';
    html += '    <input type="text" id="bl-search" placeholder="搜索客人/酒店/手機..." oninput="BookingListPage.onSearchChange(this.value)">';
    html += '    <div class="search-clear" onclick="BookingListPage.clearSearch()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>';
    html += '  </div>';
    html += '</div>';

    // Data table
    var month = State.get('workingMonth') || Utils.getCurrentMonth();
    var criteria = Utils.deepClone(_filterState);
    criteria.month = month;

    var filtered = Filters.filterBookings(Bookings.getAll(), criteria);
    var sorted = Filters.sortBookings(filtered, _sortField, _sortAsc);
    var total = sorted.length;
    var totalPages = Math.max(1, Math.ceil(total / _perPage));
    if (_currentPage > totalPages) _currentPage = totalPages;
    var pageData = Filters.paginate(sorted, _currentPage, _perPage);

    html += '<div class="data-table-wrap">';
    html += '  <div class="data-table-scroll scroll-hint' + (total > 0 ? ' scrollable' : '') + '">';
    html += '    <table class="data-table">';
    html += '      <thead><tr>';
    html += _th('客人', 'guestName');
    html += _th('體系', 'casino');
    html += _th('酒店/房型', 'hotel');
    html += _th('入住', 'checkIn');
    html += _th('退房', 'checkOut');
    html += _th('晚', 'nights', 'num-cell');
    html += _th('房數', 'roomCount', 'num-cell');
    html += _th('代理', 'agent');
    html += _th('狀態', 'status');
    html += _th('補償', 'compType');
    html += '<th class="action-cell">操作</th>';
    html += '      </tr></thead>';
    html += '      <tbody>';

    if (pageData.length === 0) {
      html += '<tr><td colspan="11" style="text-align:center;padding:var(--sp-12);color:var(--text-muted);">暫無訂房記錄，點擊「新增訂房」開始</td></tr>';
    } else {
      for (var i = 0; i < pageData.length; i++) {
        html += _bookingRow(pageData[i]);
      }
    }

    html += '      </tbody>';
    html += '    </table>';
    html += '  </div>';
    html += '</div>';

    // Pagination
    if (total > _perPage) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:var(--sp-4);">';
      html += '  <span style="font-size:var(--fs-sm);color:var(--text-muted);">共 ' + total + ' 筆，第 ' + _currentPage + '/' + totalPages + ' 頁</span>';
      html += '  <div style="display:flex;gap:var(--sp-2);">';
      html += '    <button class="btn btn-secondary btn-sm" ' + (_currentPage <= 1 ? 'disabled' : '') + ' onclick="BookingListPage.goPage(' + (_currentPage - 1) + ')">上一頁</button>';
      html += '    <button class="btn btn-secondary btn-sm" ' + (_currentPage >= totalPages ? 'disabled' : '') + ' onclick="BookingListPage.goPage(' + (_currentPage + 1) + ')">下一頁</button>';
      html += '  </div>';
    }

    container.innerHTML = html;

    // Update search clear button visibility
    _updateSearchClear();
  }

  function _th(label, field, extraClass) {
    var cls = extraClass || '';
    var sortIcon = '';
    if (field === _sortField) {
      sortIcon = _sortAsc ? ' ▲' : ' ▼';
    }
    return '<th class="' + cls + '" style="cursor:pointer;" onclick="BookingListPage.sortBy(\'' + field + '\')">' + label + sortIcon + '</th>';
  }

  function _bookingRow(b) {
    var html = '<tr>';
    html += '<td style="font-weight:600;">' + Utils.escapeHtml(b.guestName || '-') + '</td>';
    html += '<td>' + Utils.escapeHtml(b.casino || '-') + '</td>';
    html += '<td><div style="font-size:var(--fs-sm);">' + Utils.escapeHtml(b.hotel || '-') + '</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">' + Utils.escapeHtml(b.roomType || '') + '</div></td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.formatDateDisplay(b.checkIn) + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.formatDateDisplay(b.checkOut) + '</td>';
    html += '<td class="num-cell">' + (b.nights || 0) + '</td>';
    html += '<td class="num-cell">' + (b.roomCount || 1) + '</td>';
    html += '<td>' + Utils.escapeHtml(b.agent || '-') + '</td>';
    html += '<td>' + Utils.statusBadge(b.status) + '</td>';
    html += '<td><span class="comp-badge ' + (b.compType || 'free-room') + '">' + Utils.escapeHtml(COMP_TYPE_LABELS[b.compType] || b.compType || '-') + '</span></td>';
    html += '<td class="action-cell">';
    html += '  <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();viewBookingDetail(\'' + b._fbKey + '\')" data-tooltip="查看">查看</button>';
    html += '  <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editBooking(\'' + b._fbKey + '\')" data-tooltip="編輯">編輯</button>';
    html += '  <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteBooking(\'' + b._fbKey + '\')" data-tooltip="刪除">刪除</button>';
    html += '</td>';
    html += '</tr>';
    return html;
  }

  // Public methods for filter interactions
  function onFilterChange() {
    _currentPage = 1;
    var casinoEl = document.getElementById('bl-filter-casino');
    var statusEl = document.getElementById('bl-filter-status');
    var agentEl = document.getElementById('bl-filter-agent');
    _filterState = {};
    if (casinoEl && casinoEl.value) _filterState.casino = casinoEl.value;
    if (statusEl && statusEl.value) _filterState.status = statusEl.value;
    if (agentEl && agentEl.value) _filterState.agent = agentEl.value;
    render();
  }

  function onSearchChange(val) {
    _currentPage = 1;
    _filterState.keyword = val || '';
    render();
    // Restore focus to search
    var search = document.getElementById('bl-search');
    if (search) {
      search.focus();
      search.setSelectionRange(search.value.length, search.value.length);
    }
  }

  function clearSearch() {
    _filterState.keyword = '';
    _currentPage = 1;
    render();
  }

  function _updateSearchClear() {
    var box = document.querySelector('.search-box');
    var input = document.getElementById('bl-search');
    if (box && input) {
      if (input.value) box.classList.add('has-value');
      else box.classList.remove('has-value');
    }
  }

  function sortBy(field) {
    if (field === _sortField) {
      _sortAsc = !_sortAsc;
    } else {
      _sortField = field;
      _sortAsc = true;
    }
    render();
  }

  function goPage(page) {
    _currentPage = page;
    render();
  }

  return {
    render: render,
    onFilterChange: onFilterChange,
    onSearchChange: onSearchChange,
    clearSearch: clearSearch,
    sortBy: sortBy,
    goPage: goPage
  };
})();

// Global alias
function renderBookingList() { BookingListPage.render(); }

</script>
