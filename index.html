<script>
/**
 * stats.js — Statistics Page
 * Booking System v1.0.0
 * Renders: Casino matrix + Agent matrix + Transfer stats + Top rankings
 */
var StatsPage = (function () {

  function render() {
    var container = document.getElementById('page-stats');
    if (!container) return;

    var month = State.get('workingMonth') || Utils.getCurrentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });

    var html = '';

    // Page header
    html += '<div class="page-header">';
    html += '  <h3>統計分析 — ' + month + '</h3>';
    html += '</div>';

    // KPI summary
    var total = Stats.totalBookings(monthBookings);
    var totalRooms = Stats.totalRooms(monthBookings);
    var totalNights = Stats.totalRoomNights(monthBookings);
    var totalThreshold = Stats.totalThreshold(monthBookings);
    var totalVolume = Stats.totalVolume(monthBookings);
    var totalCost = Stats.totalCost(monthBookings);

    html += '<div class="kpi-grid">';
    html += _kpiCard('kpi-cyan', '訂房總數', total, '');
    html += _kpiCard('kpi-violet', '房間總數', totalRooms, '');
    html += _kpiCard('kpi-gold', '總房晚', totalNights, '');
    html += _kpiCard('kpi-success', '總洗碼量', Utils.formatNumber(totalVolume), '');
    html += _kpiCard('kpi-danger', '總門檻', Utils.formatNumber(totalThreshold), '');
    html += '</div>';

    // Casino × Status matrix
    html += '<div class="card" style="margin-bottom:var(--sp-4);">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg></div>';
    html += '    體系 × 狀態 矩陣';
    html += '  </div>';
    html += _casinoMatrixTable(monthBookings);
    html += '</div>';

    // Agent × Casino matrix
    html += '<div class="card" style="margin-bottom:var(--sp-4);">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>';
    html += '    代理 × 體系 矩陣';
    html += '  </div>';
    html += _agentMatrixTable(monthBookings);
    html += '</div>';

    // Two columns: Transfer stats + Top agents
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">';

    // Transfer stats
    html += '<div class="card">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>';
    html += '    接送統計';
    html += '  </div>';
    var transferStats = Stats.transferStats(monthBookings);
    var transferLabels = { none: '無', airport: '機場接送', ferry: '碼頭接送', both: '機場+碼頭', custom: '自定義' };
    for (var tKey in transferStats) {
      html += _statRow(transferLabels[tKey] || tKey, transferStats[tKey]);
    }
    html += '</div>';

    // Top agents
    html += '<div class="card">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></div>';
    html += '    代理排行 (TOP 5)';
    html += '  </div>';
    var topAgents = Stats.topAgents(monthBookings, 5);
    if (topAgents.length === 0) {
      html += _emptyStateMini('暫無數據');
    } else {
      for (var i = 0; i < topAgents.length; i++) {
        var rank = i + 1;
        var rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        html += '<div class="stat-row">';
        html += '  <span class="stat-label">' + rankIcon + ' ' + Utils.escapeHtml(topAgents[i].agent) + '</span>';
        html += '  <span class="stat-value">' + topAgents[i].count + ' 筆</span>';
        html += '</div>';
      }
    }
    html += '</div>';

    html += '</div>'; // end grid

    container.innerHTML = html;
  }

  function _casinoMatrixTable(bookings) {
    var matrix = Stats.casinoMatrix(bookings);
    var casinos = CASINO_ORDER.slice();

    // Add any casinos not in preset
    for (var c in matrix) {
      if (casinos.indexOf(c) === -1) casinos.push(c);
    }

    var statuses = ['pending', 'confirmed', 'checked-in', 'checked-out', 'cancelled'];
    var statusLabels = BOOKING_STATUS_LABELS;

    var html = '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="data-table"><thead><tr><th>體系</th>';
    for (var s = 0; s < statuses.length; s++) {
      html += '<th class="num-cell">' + Utils.escapeHtml(statusLabels[statuses[s]]) + '</th>';
    }
    html += '<th class="num-cell">合計</th></tr></thead><tbody>';

    var grandTotal = 0;
    for (var i = 0; i < casinos.length; i++) {
      var casino = casinos[i];
      var row = matrix[casino];
      if (!row) continue;
      html += '<tr><td style="font-weight:600;">' + Utils.escapeHtml(casino) + '</td>';
      for (var j = 0; j < statuses.length; j++) {
        var count = row[statuses[j]] || 0;
        html += '<td class="num-cell">' + (count || '-') + '</td>';
      }
      html += '<td class="num-cell" style="font-weight:700;color:var(--color-tech-cyan);">' + (row._total || 0) + '</td>';
      html += '</tr>';
      grandTotal += (row._total || 0);
    }

    // Totals row
    html += '<tr style="background:var(--bg-elevated);font-weight:700;"><td>合計</td>';
    for (var k = 0; k < statuses.length; k++) {
      var statusTotal = 0;
      for (var ci = 0; ci < casinos.length; ci++) {
        if (matrix[casinos[ci]]) {
          statusTotal += (matrix[casinos[ci]][statuses[k]] || 0);
        }
      }
      html += '<td class="num-cell">' + (statusTotal || '-') + '</td>';
    }
    html += '<td class="num-cell" style="color:var(--color-tech-cyan);">' + grandTotal + '</td>';
    html += '</tr>';

    html += '</tbody></table></div></div>';
    return html;
  }

  function _agentMatrixTable(bookings) {
    var matrix = Stats.agentMatrix(bookings);
    var agents = [];
    for (var a in matrix) {
      agents.push({ name: a, total: matrix[a]._total || 0 });
    }
    agents.sort(function (x, y) { return y.total - x.total; });

    var casinos = CASINO_ORDER.slice();
    for (var c in matrix) {
      for (var ck in matrix[c]) {
        if (ck !== '_total' && casinos.indexOf(ck) === -1) casinos.push(ck);
      }
    }

    var html = '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="data-table"><thead><tr><th>代理</th>';
    for (var i = 0; i < casinos.length; i++) {
      html += '<th class="num-cell">' + Utils.escapeHtml(casinos[i]) + '</th>';
    }
    html += '<th class="num-cell">合計</th></tr></thead><tbody>';

    for (var j = 0; j < agents.length; j++) {
      var agentName = agents[j].name;
      var row = matrix[agentName];
      html += '<tr><td style="font-weight:600;">' + Utils.escapeHtml(agentName) + '</td>';
      for (var ci2 = 0; ci2 < casinos.length; ci2++) {
        var count = row[casinos[ci2]] || 0;
        html += '<td class="num-cell">' + (count || '-') + '</td>';
      }
      html += '<td class="num-cell" style="font-weight:700;color:var(--color-tech-cyan);">' + (row._total || 0) + '</td>';
      html += '</tr>';
    }

    if (agents.length === 0) {
      html += '<tr><td colspan="' + (casinos.length + 2) + '" style="text-align:center;padding:var(--sp-6);color:var(--text-muted);">暫無數據</td></tr>';
    }

    html += '</tbody></table></div></div>';
    return html;
  }

  function _kpiCard(colorClass, label, value, unit) {
    return '<div class="kpi-card ' + colorClass + '">' +
      '<div class="kpi-header"><span class="kpi-label">' + label + '</span></div>' +
      '<div class="kpi-value tabular-nums">' + value + '</div>' +
      (unit ? '<span class="kpi-sub">' + unit + '</span>' : '') +
      '</div>';
  }

  function _statRow(label, value) {
    return '<div class="stat-row"><span class="stat-label">' + Utils.escapeHtml(label) + '</span><span class="stat-value">' + value + '</span></div>';
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' + Utils.escapeHtml(text) + '</div>';
  }

  return { render: render };
})();

// Global alias
function renderStats() { StatsPage.render(); }

</script>

<script>
/**
 * bot-log.js — Bot Activity Log Page
 * Booking System v1.0.0
 * Renders: Telegram Bot interaction history
 */
var BotLogPage = (function () {

  function render() {
    var container = document.getElementById('page-bot-log');
    if (!container) return;

    var logs = State.get('botLogs') || [];

    var html = '';

    // Page header
    html += '<div class="page-header">';
    html += '  <h3>Bot 操作日誌</h3>';
    html += '  <div class="page-actions">';
    if (logs.length > 0) {
      html += '    <button class="btn btn-secondary" onclick="exportBotLogs()">';
      html += '      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>';
      html += '      匯出';
      html += '    </button>';
    }
    html += '  </div>';
    html += '</div>';

    // Summary
    html += '<div class="kpi-grid">';
    html += _kpiCard('kpi-violet', '總日誌數', logs.length, '');
    var todayCount = 0;
    var todayStr = Utils.formatDate(new Date());
    for (var i = 0; i < logs.length; i++) {
      if (logs[i]._createdAt && Utils.formatDate(logs[i]._createdAt) === todayStr) todayCount++;
    }
    html += _kpiCard('kpi-cyan', '今日操作', todayCount, '');
    var uniqueAgents = {};
    for (var j = 0; j < logs.length; j++) {
      uniqueAgents[logs[j].agent || 'unknown'] = true;
    }
    html += _kpiCard('kpi-success', '活躍代理', Object.keys(uniqueAgents).length, '');
    html += '</div>';

    // Log list
    html += '<div class="card">';
    html += '  <div class="card-title">';
    html += '    <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg></div>';
    html += '    操作記錄';
    html += '  </div>';

    if (logs.length === 0) {
      html += _emptyState();
    } else {
      // Sort by createdAt desc
      var sorted = logs.slice().sort(function (a, b) {
        return (b._createdAt || 0) - (a._createdAt || 0);
      });

      for (var k = 0; k < sorted.length; k++) {
        html += _logEntry(sorted[k]);
      }
    }

    html += '</div>';

    container.innerHTML = html;
  }

  function _logEntry(log) {
    var time = log._createdAt ? new Date(log._createdAt) : null;
    var timeStr = time ? time.toLocaleString('zh-TW', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    }) : '--';

    var initial = (log.agent || '?').charAt(0).toUpperCase();

    var html = '<div class="bot-log-entry">';
    html += '  <div class="log-avatar">' + Utils.escapeHtml(initial) + '</div>';
    html += '  <div class="log-content">';
    html += '    <div class="log-header">';
    html += '      <span class="log-agent">' + Utils.escapeHtml(log.agent || '未知代理') + '</span>';
    html += '      <span class="log-time">' + timeStr + '</span>';
    html += '    </div>';
    html += '    <div class="log-message">' + Utils.escapeHtml(log.message || log.action || '') + '</div>';
    if (log.action) {
      html += '    <div class="log-action">' + Utils.escapeHtml(log.action) + '</div>';
    }
    html += '  </div>';
    html += '</div>';
    return html;
  }

  function _kpiCard(colorClass, label, value, unit) {
    return '<div class="kpi-card ' + colorClass + '">' +
      '<div class="kpi-header"><span class="kpi-label">' + label + '</span></div>' +
      '<div class="kpi-value tabular-nums">' + value + '</div>' +
      (unit ? '<span class="kpi-sub">' + unit + '</span>' : '') +
      '</div>';
  }

  function _emptyState() {
    return '<div class="empty-state">' +
      '<div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg></div>' +
      '<div class="empty-title">暫無 Bot 操作日誌</div>' +
      '<div class="empty-desc">當員工通過 Telegram Bot 操作訂房時，日誌將顯示在此</div>' +
      '</div>';
  }

  return { render: render };
})();

// Global alias
function renderBotLog() { BotLogPage.render(); }

</script>

function prevMonth() {
  var month = State.get('workingMonth');
  if (!month) return;
  var parts = month.split('-');
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) - 1;
  if (m === 0) { m = 12; y--; }
  var newMonth = y + '-' + Utils.pad(m);
  State.set('workingMonth', newMonth);
  Store.saveWorkingMonth(newMonth);
  Events.emit(EVENTS.MONTH_CHANGED, newMonth);
  Events.emit(EVENTS.UI_RENDER);
}

function nextMonth() {
  var month = State.get('workingMonth');
  if (!month) return;
  var parts = month.split('-');
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) + 1;
  if (m === 13) { m = 1; y++; }
  var newMonth = y + '-' + Utils.pad(m);
  State.set('workingMonth', newMonth);
  Store.saveWorkingMonth(newMonth);
  Events.emit(EVENTS.MONTH_CHANGED, newMonth);
  Events.emit(EVENTS.UI_RENDER);

function onCasinoChange() {
  var casino = document.getElementById('bk-casino').value;
  var hotelSelect = document.getElementById('bk-hotel');
  var roomSelect = document.getElementById('bk-roomType');

  roomSelect.innerHTML = '<option value="">請先選擇酒店</option>';
  roomSelect.disabled = true;

  if (!casino) {
    hotelSelect.innerHTML = '<option value="">請先選擇體系</option>';
    hotelSelect.disabled = true;
    return;
  }

  var hotelNames = Hotels.getHotelNames(casino);
  hotelSelect.innerHTML = '<option value="">請選擇</option>';
  for (var i = 0; i < hotelNames.length; i++) {
    hotelSelect.innerHTML += '<option value="' + Utils.escapeHtml(hotelNames[i]) + '">' + Utils.escapeHtml(hotelNames[i]) + '</option>';
  }
  hotelSelect.disabled = false;
}

function onHotelChange() {
  var casino = document.getElementById('bk-casino').value;
  var hotel = document.getElementById('bk-hotel').value;
  var roomSelect = document.getElementById('bk-roomType');

  if (!casino || !hotel) {
    roomSelect.innerHTML = '<option value="">請先選擇酒店</option>';
    roomSelect.disabled = true;
    return;
  }

  var rooms = Hotels.getRooms(casino, hotel);
  roomSelect.innerHTML = '<option value="">請選擇</option>';
  for (var i = 0; i < rooms.length; i++) {
    roomSelect.innerHTML += '<option value="' + Utils.escapeHtml(rooms[i].room) + '" data-code="' + Utils.escapeHtml(rooms[i].code) + '" data-threshold="' + rooms[i].threshold + '">' + Utils.escapeHtml(rooms[i].room) + ' (門檻: ' + Utils.formatNumber(rooms[i].threshold) + ')</option>';
  }
  roomSelect.disabled = false;

  // Auto-fill threshold on room change
  roomSelect.onchange = function () {
    var selected = roomSelect.options[roomSelect.selectedIndex];
    var threshold = selected ? selected.getAttribute('data-threshold') : 0;
    document.getElementById('bk-threshold').value = threshold || 0;
    _updateThresholdTotal();
  };
}

function onCheckInChange() {
  var checkIn = document.getElementById('bk-checkIn').value;
  var checkOut = document.getElementById('bk-checkOut').value;
  if (checkIn && checkOut) {
    var nights = Utils.calcNights(checkIn, checkOut);
    document.getElementById('bk-nights').value = nights;
  }
}

function _updateThresholdTotal() {
  // Could show per-room threshold * room count
  var threshold = parseInt(document.getElementById('bk-threshold').value, 10) || 0;
  var roomCount = parseInt(document.getElementById('bk-roomCount').value, 10) || 1;
  // Just update display if needed
}

function saveBookingForm() {
  var data = {
    guestName: document.getElementById('bk-guestName').value.trim(),
    guestCount: parseInt(document.getElementById('bk-guestCount').value, 10) || 1,
    agent: document.getElementById('bk-agent').value,
    operator: document.getElementById('bk-operator').value.trim(),
    casino: document.getElementById('bk-casino').value,
    hotel: document.getElementById('bk-hotel').value,
    roomType: document.getElementById('bk-roomType').value,
    roomCount: parseInt(document.getElementById('bk-roomCount').value, 10) || 1,
    checkIn: document.getElementById('bk-checkIn').value,
    checkOut: document.getElementById('bk-checkOut').value,
    compType: document.getElementById('bk-compType').value,
    status: document.getElementById('bk-status').value,
    threshold: parseInt(document.getElementById('bk-threshold').value, 10) || 0,
    volume: parseInt(document.getElementById('bk-volume').value, 10) || 0,
    pricePerNight: parseInt(document.getElementById('bk-pricePerNight').value, 10) || 0,
    transfer: document.getElementById('bk-transfer').value,
    flightNo: document.getElementById('bk-flightNo').value.trim(),
    phone: document.getElementById('bk-phone').value.trim(),
    specialRequest: document.getElementById('bk-specialRequest').value.trim()
  };

  // Validation
  if (!data.guestName) { Toast.error('請輸入客人姓名'); return; }
  if (!data.agent) { Toast.error('請選擇代理'); return; }
  if (!data.casino) { Toast.error('請選擇體系'); return; }
  if (!data.checkIn || !data.checkOut) { Toast.error('請選擇入住和退房日期'); return; }

  if (_editingBookingKey) {
    Bookings.update(_editingBookingKey, data);
    Toast.success('訂房已更新');
  } else {
    Bookings.create(data);
    Toast.success('訂房已建立');
  }

  Modal.close();
  Events.emit(EVENTS.UI_RENDER);
}

function editBooking(fbKey) {
  var booking = Bookings.getByKey(fbKey);
  if (!booking) { Toast.error('找不到訂房記錄'); return; }

  _editingBookingKey = fbKey;
  openBookingModal();

  // Fill form with existing data
  setTimeout(function () {
    document.getElementById('bk-guestName').value = booking.guestName || '';
    document.getElementById('bk-guestCount').value = booking.guestCount || 1;
    document.getElementById('bk-agent').value = booking.agent || '';
    document.getElementById('bk-operator').value = booking.operator || '';
    document.getElementById('bk-casino').value = booking.casino || '';
    onCasinoChange();
    document.getElementById('bk-hotel').value = booking.hotel || '';
    onHotelChange();
    document.getElementById('bk-roomType').value = booking.roomType || '';
    document.getElementById('bk-roomCount').value = booking.roomCount || 1;
    document.getElementById('bk-checkIn').value = booking.checkIn || '';
    document.getElementById('bk-checkOut').value = booking.checkOut || '';
    onCheckInChange();
    document.getElementById('bk-compType').value = booking.compType || 'free-room';
    document.getElementById('bk-status').value = booking.status || 'pending';
    document.getElementById('bk-threshold').value = booking.threshold || 0;
    document.getElementById('bk-volume').value = booking.volume || 0;
    document.getElementById('bk-pricePerNight').value = booking.pricePerNight || 0;
    document.getElementById('bk-transfer').value = booking.transfer || 'none';
    document.getElementById('bk-flightNo').value = booking.flightNo || '';
    document.getElementById('bk-phone').value = booking.phone || '';
    document.getElementById('bk-specialRequest').value = booking.specialRequest || '';
  }, 50);
}

  }

  var footer = '<button class="btn btn-secondary" data-modal-close>關閉</button>';
  footer += '<button class="btn btn-danger" onclick="deleteBooking(\'' + fbKey + '\')">刪除</button>';
  footer += '<button class="btn btn-primary" onclick="Modal.close();editBooking(\'' + fbKey + '\')">編輯</button>';

  Modal.open({
    title: '訂房詳情 — ' + (b.guestName || ''),

function deleteBooking(fbKey) {
  var b = Bookings.getByKey(fbKey);
  if (!b) return;

  Modal.confirm(
    '確認刪除「' + (b.guestName || '') + '」的訂房記錄？此操作不可撤銷。',
    function () {
      Bookings.delete(fbKey);
      Toast.success('訂房已刪除');
      Events.emit(EVENTS.UI_RENDER);
    },
    { title: '刪除確認', confirmText: '確認刪除' }
  );
}

function _detailField(label, value) {
  return '<div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:2px;">' + Utils.escapeHtml(label) + '</div>' +
         '<div style="font-size:var(--fs-sm);font-weight:500;">' + (value !== undefined && value !== null && value !== '' ? Utils.escapeHtml(String(value)) : '-') + '</div></div>';
}

function _transferLabel(val) {
  var labels = { none: '無', airport: '機場接送', ferry: '碼頭接送', both: '機場+碼頭', custom: '自定義' };
  return labels[val] || val || '無';
}

 * Agent Management
 * ============================================================ */

function openAgentModal() {
  var agents = Agents.getAll();
  var body = '<div id="agent-list-container">';

  if (agents.length === 0) {
    body += '<div class="empty-state"><div class="empty-title">暫無代理</div><div class="empty-desc">點擊下方按鈕新增代理</div></div>';
  } else {
    body += '<div class="data-table-wrap"><div class="data-table-scroll"><table class="data-table"><thead><tr><th>代理名稱</th><th>手機號碼</th><th>操作</th></tr></thead><tbody>';
    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      var name = typeof a === 'object' ? (a.name || '') : a;
      var phone = typeof a === 'object' ? (a.phone || '') : '';

      body += '<td class="action-cell"><button class="btn btn-danger btn-sm" onclick="removeAgent(\'' + Utils.escapeHtml(name) + '\')">刪除</button></td></tr>';
    }
    body += '</tbody></table></div></div>';
  }

  body += '</div>';
  body += '<div style="margin-top:var(--sp-4);display:flex;gap:var(--sp-2);">';
  body += '<input type="text" class="form-control" id="new-agent-name" placeholder="代理名稱" style="flex:1;">';
  body += '<input type="text" class="form-control" id="new-agent-phone" placeholder="手機號碼" style="flex:1;">';
  body += '<button class="btn btn-primary" onclick="addAgentFromModal()">新增</button>';
  body += '</div>';

  Modal.open({
    title: '代理名單管理',
    body: body,
    size: 'md'
  });

function addAgentFromModal() {
  var name = document.getElementById('new-agent-name').value.trim();
  var phone = document.getElementById('new-agent-phone').value.trim();
  if (!name) { Toast.error('請輸入代理名稱'); return; }

  Toast.success('代理已新增: ' + name);
  Modal.close();
  openAgentModal();
  Events.emit(EVENTS.UI_RENDER);
}

function removeAgent(name) {
  Modal.confirm('確認刪除代理「' + name + '」？', function () {
    Agents.remove(name);
    Toast.success('代理已刪除');
    Modal.close();
    openAgentModal();
    Events.emit(EVENTS.UI_RENDER);
  }, { title: '刪除代理', confirmText: '確認刪除' });
}

/* ============================================================
 * Sync Actions
 * ============================================================ */

function manualSync() {
  Toast.info('正在同步...');
  if (typeof syncUploadAll === 'function') {
    syncUploadAll(function () {
      Toast.success('同步完成');
    });
  }
}

/* ============================================================
 * Backup Actions
 * ============================================================ */

function openBackupModal() {
  var backups = Backup.list();
  var body = '';

  body += '<div style="display:flex;gap:var(--sp-2);margin-bottom:var(--sp-4);">';
  body += '<button class="btn btn-primary" onclick="createBackup()">建立備份</button>';
  body += '<button class="btn btn-secondary" onclick="exportJSON()">匯出 JSON</button>';
  body += '<label class="btn btn-secondary" style="cursor:pointer;">匯入 JSON<input type="file" accept=".json" style="display:none;" onchange="importJSON(event)"></label>';
  body += '</div>';

  if (backups.length === 0) {
    body += '<div class="empty-state"><div class="empty-title">暫無備份</div></div>';
  } else {
    body += '<div class="data-table-wrap"><div class="data-table-scroll"><table class="data-table"><thead><tr><th>標籤</th><th>時間</th><th>操作</th></tr></thead><tbody>';
    for (var i = 0; i < backups.length; i++) {
      body += '<tr><td>' + Utils.escapeHtml(backups[i].label) + '</td>';
      body += '<td>' + new Date(backups[i].timestamp).toLocaleString('zh-TW') + '</td>';
      body += '<td class="action-cell">';
      body += '<button class="btn btn-secondary btn-sm" onclick="restoreBackup(\'' + backups[i].id + '\')">還原</button>';
      body += '<button class="btn btn-danger btn-sm" onclick="deleteBackup(\'' + backups[i].id + '\')">刪除</button>';
      body += '</td></tr>';
    }
    body += '</tbody></table></div></div>';
  }

  Modal.open({ title: '備份與還原', body: body, size: 'md' });
}

function createBackup() {
  var label = '備份 ' + new Date().toLocaleString('zh-TW');
  Backup.create(label);
  Toast.success('備份已建立');
  Modal.close();
  openBackupModal();
}

function restoreBackup(id) {
  Modal.confirm('確認還原此備份？當前資料將被覆蓋。', function () {
    Backup.restore(id);
    Toast.success('備份已還原');
    Modal.close();
    Events.emit(EVENTS.UI_RENDER);
  }, { title: '還原確認', confirmText: '確認還原' });
}

function deleteBackup(id) {
  Modal.confirm('確認刪除此備份？', function () {
    Backup.remove(id);
    Toast.success('備份已刪除');
    Modal.close();
    openBackupModal();
  }, { title: '刪除確認', confirmText: '確認刪除' });
}

function exportJSON() {
  Backup.exportJSON();
  Toast.success('JSON 已匯出');
}

function importJSON(event) {
  var file = event.target.files[0];
  if (!file) return;
  Backup.importJSON(file, function (err) {
    if (err) {
      Toast.error('匯入失敗: ' + err);
    } else {
      Toast.success('匯入成功');
      Modal.close();
      Events.emit(EVENTS.UI_RENDER);
    }
  });
}

/* ============================================================
 * Bot Log Export
 * ============================================================ */

function exportBotLogs() {
  var logs = State.get('botLogs') || [];
  var data = {
    exportedAt: new Date().toISOString(),
    count: logs.length,
    logs: logs
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'bot-logs-' + Utils.formatDate(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  Toast.success('日誌已匯出');
}

/* ============================================================
 * Auth Actions
 * ============================================================ */

function handleLogin(event) {
  if (event && event.key !== 'Enter') return;
  var input = document.getElementById('login-password');
  var errorEl = document.getElementById('login-error');
  var password = input ? input.value : '';

  if (!password) {
    if (errorEl) errorEl.textContent = '請輸入密碼';
    return;
  }

  if (Auth.login(password)) {
    var overlay = document.getElementById('login-overlay');
    if (overlay) overlay.classList.add('hidden');
    App.afterLogin();
  } else {
    if (errorEl) errorEl.textContent = '密碼錯誤';
    if (input) {
      input.value = '';
      input.focus();
    }
  }
}

function handleLogout() {
  Auth.logout();
  location.reload();
}

/* ============================================================
 * Clear Data
 * ============================================================ */

function clearAllData() {
  Modal.confirm(
    '確認清除所有本地和雲端資料？此操作將刪除所有訂房記錄（保留代理名單），不可撤銷！',
    function () {
      Store.clearLocalData();
      if (typeof clearFirebaseData === 'function') {
        clearFirebaseData();
      }
      Toast.success('所有資料已清除');
      Events.emit(EVENTS.UI_RENDER);
    },
    { title: '⚠️ 危險操作', confirmText: '確認清除全部' }
  );
}

</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  if (typeof Auth !== "undefined" && Auth.isLoggedIn()) {
    var overlay = document.getElementById("login-overlay");
    if (overlay) overlay.classList.add("hidden");
    App.init();
  }
  var pwdInput = document.getElementById("login-password");
  if (pwdInput) pwdInput.focus();
});
</script>
