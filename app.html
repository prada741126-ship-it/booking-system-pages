      html += '  <div class="kpi-label">' + Utils.escapeHtml(label) + '</div>';
      if (sub) {
        html += '  <div class="kpi-sub">' + Utils.escapeHtml(sub) + '</div>';
      }
    } else {
      html += '  <div class="kpi-header">';
      html += '    <span class="kpi-label">' + Utils.escapeHtml(label) + '</span>';
      html += '    <div class="kpi-icon">' + iconSvg + '</div>';
      html += '  </div>';
      html += '  <div class="kpi-value tabular-nums">' + value + '</div>';
      if (unit || sub) {
        html += '  <span class="kpi-sub">';
        if (unit) html += Utils.escapeHtml(unit);
        if (unit && sub) html += ' — ';
        if (sub) html += Utils.escapeHtml(sub);
        html += '</span>';
      }
    }
    html += '</div>';
    return html;
  }

  function _statusRow(label, count, total, color) {
    var pct = total > 0 ? (count / total * 100) : 0;
    var html = '<div class="stat-row" style="flex-direction:column;align-items:stretch;gap:4px;">';
    html += '  <div style="display:flex;justify-content:space-between;align-items:center;">';
    html += '    <span class="stat-label" style="display:flex;align-items:center;gap:6px;">';
    html += '      <span style="width:8px;height:8px;border-radius:50%;background:' + color + ';"></span>';
    html += '      ' + Utils.escapeHtml(label);
    html += '    </span>';
    html += '    <span class="stat-value">' + count + ' <span style="color:var(--text-muted);font-weight:400;font-size:var(--fs-xs);">(' + pct.toFixed(0) + '%)</span></span>';
    html += '  </div>';
    html += '  <div style="height:6px;background:var(--bg-base);border-radius:var(--radius-full);overflow:hidden;">';
    html += '    <div style="height:100%;width:' + pct.toFixed(1) + '%;background:' + color + ';border-radius:var(--radius-full);transition:width 0.6s var(--tr-smooth);"></div>';
    html += '  </div>';
    html += '</div>';
    return html;
  }

  function _statRow(label, value, badgeClass) {
    var valHtml = badgeClass ? '<span class="' + badgeClass + '">' + value + '</span>' : value;
    return '<div class="stat-row"><span class="stat-label">' + Utils.escapeHtml(label) + '</span><span class="stat-value">' + valHtml + '</span></div>';
  }

  /* Donut chart for fee distribution (CSS conic-gradient) */
  function _feeDonut(freeCount, paidCount) {
    var total = freeCount + paidCount;
    if (total === 0) {
      return '<div style="text-align:center;padding:var(--sp-6);color:var(--text-muted);font-size:var(--fs-sm);">暫無數據</div>';
    }
    var freePct = total > 0 ? (freeCount / total * 100) : 0;
    var paidPct = total > 0 ? (paidCount / total * 100) : 0;
    var freeColor = '#16a34a';
    var paidColor = '#f59e0b';

    var html = '<div style="display:flex;align-items:center;gap:var(--sp-4);">';
    /* Donut chart using conic-gradient */
    html += '<div style="width:110px;height:110px;border-radius:50%;';
    html += 'background:conic-gradient(' + freeColor + ' 0% ' + freePct.toFixed(1) + '%, ' + paidColor + ' ' + freePct.toFixed(1) + '% 100%);';
    html += 'display:flex;align-items:center;justify-content:center;flex-shrink:0;';
    html += 'box-shadow:0 2px 8px rgba(0,0,0,0.08);">';
    html += '<div style="width:72px;height:72px;border-radius:50%;background:var(--bg-elevated);display:flex;flex-direction:column;align-items:center;justify-content:center;">';
    html += '<span style="font-size:var(--fs-xl);font-weight:var(--fw-extrabold);color:var(--text-primary);">' + total + '</span>';
    html += '<span style="font-size:var(--fs-xs);color:var(--text-muted);">總房數</span>';
    html += '</div></div>';
    /* Legend */
    html += '<div style="flex:1;">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:var(--sp-2);">';
    html += '<span style="width:10px;height:10px;border-radius:2px;background:' + freeColor + ';flex-shrink:0;"></span>';
    html += '<span style="font-size:var(--fs-sm);color:var(--text-secondary);">免費房 ' + freeCount + ' (' + freePct.toFixed(0) + '%)</span>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;">';
    html += '<span style="width:10px;height:10px;border-radius:2px;background:' + paidColor + ';flex-shrink:0;"></span>';
    html += '<span style="font-size:var(--fs-sm);color:var(--text-secondary);">收費房 ' + paidCount + ' (' + paidPct.toFixed(0) + '%)</span>';
    html += '</div>';
    html += '</div></div>';
    return html;
  }

  function _recentRow(b) {
    var html = '<tr style="cursor:pointer;" onclick="viewBookingDetail(\'' + b._fbKey + '\')">';
    html += '<td style="font-weight:600;">' + Utils.escapeHtml(b.guestName || '-') + '</td>';
    html += '<td>' + Utils.escapeHtml(b.casino || '-') + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.formatDateDisplay(b.checkIn) + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.formatDateDisplay(b.checkOut) + '</td>';
    html += '<td class="num-cell" style="text-align:center;">' + (b.nights || 0) + '</td>';
    html += '<td>' + Utils.escapeHtml(b.agent || '-') + '</td>';
    html += '<td><span class="fee-badge ' + (b.feeStatus || 'free') + '">' + (FEE_TYPE_LABELS[b.feeStatus] || '免費') + '</span></td>';
    html += '<td>' + _statusBadge(b.status) + '</td>';
    html += '<td style="font-size:var(--fs-sm);white-space:nowrap;">' + _fmtTimestamp(b._createdAt) + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.escapeHtml(b.createdBy || b.employee || '-') + '</td>';
    html += '</tr>';
    return html;
  }

  /* Format timestamp (Date.now) to MM/DD */
  function _fmtTimestamp(ts) {
    if (!ts) return '-';
    var d = new Date(ts);
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    return (mm < 10 ? '0' : '') + mm + '/' + (dd < 10 ? '0' : '') + dd;
  }

  function _statusBadge(status) {
    return '<span class="status-badge status-' + status + '">' + Utils.escapeHtml(BOOKING_STATUS_LABELS[status] || status) + '</span>';
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' +
           Utils.escapeHtml(text) + '</div>';
  }

  return { render: render };
})();

function renderOverview() { OverviewPage.render(); }

</script>

<!-- ===== src/pages/profit.js ===== -->
<script>
/**
 * profit.js — Profit Settlement Page (Ctrl+2)
 * Booking System v2.0.9
 * Accountant fills chargeCompany -> auto-calc profit = chargeGuest - chargeCompany
 * Only shows paid bookings (free bookings shown grayed out without input)
 * Silent save: updates DOM in-place without full page re-render
 */
var ProfitPage = (function () {

  var _filterFee = '';  /* '', 'free', 'paid' */

  function render() {
    var container = document.getElementById('page-profit');
    if (!container) return;

    var month = State.get('workingMonth') || Utils.currentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });
    var feeCounts = Stats.countByFeeStatus(monthBookings);
    var feeStatsData = Stats.feeStats(monthBookings);

    var html = '';

    /* Page header */
    html += '<div class="page-header">';
    html += '  <h3>利潤結算 — ' + month + '</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-secondary" onclick="window.print()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>';
    html += '      列印';
    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    /* KPI Cards */
    html += '<div class="kpi-grid" id="profit-kpi-grid">';
    html += _buildKPIs(monthBookings, feeCounts, feeStatsData);
    html += '</div>';

    /* Quick filter */
    html += '<div class="quick-filters" style="margin-bottom:var(--sp-4);">';
    html += '<button class="quick-filter-btn' + (_filterFee === '' ? ' active' : '') + '" onclick="ProfitPage.setFilter(\'\')">全部 (' + monthBookings.length + ')</button>';
    html += '<button class="quick-filter-btn' + (_filterFee === 'paid' ? ' active' : '') + '" onclick="ProfitPage.setFilter(\'paid\')">收費 (' + feeCounts.paid + ')</button>';
    html += '<button class="quick-filter-btn' + (_filterFee === 'free' ? ' active' : '') + '" onclick="ProfitPage.setFilter(\'free\')">免費 (' + feeCounts.free + ')</button>';
    html += '</div>';

    /* Profit table */
    var filtered = _filterFee ? monthBookings.filter(function (b) { return b.feeStatus === _filterFee; }) : monthBookings;
    var sorted = _sortBookings(filtered);

    html += '<div class="card">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>利潤明細</div>';

    /* Formula hint */
    html += '<div style="margin-bottom:var(--sp-2);color:var(--text-muted);font-size:var(--fs-xs);">';
    html += '利潤 = 向客人收 − 交公司。免費房以灰色顯示，不需填入交公司金額。';
    html += '</div>';

    if (sorted.length === 0) {
      html += _emptyStateMini('暫無記錄');
    } else {
      html += '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
      html += '<table class="data-table"><thead><tr>';
      html += '<th>代理</th><th>客人</th><th>酒店</th>';
      html += '<th style="text-align:right;width:90px;">向客人收</th>';
      html += '<th style="text-align:right;width:90px;">交公司</th>';
      html += '<th style="text-align:right;width:90px;">利潤</th>';
      html += '<th style="width:50px;">幣別</th>';
      html += '</tr></thead><tbody id="profit-table-body">';

      for (var i = 0; i < sorted.length; i++) {
        html += _profitRow(sorted[i]);
      }

      /* Summary row */
      html += _summaryRow(sorted);

      html += '</tbody></table></div></div>';
    }
    html += '</div>';

    container.innerHTML = html;
  }

  /* ===== Sort by agent first, then checkIn ===== */
  function _sortBookings(bookings) {
    return bookings.slice().sort(function (a, b) {
      var agentA = (a.agent || '').toLowerCase();
      var agentB = (b.agent || '').toLowerCase();
      if (agentA !== agentB) return agentA < agentB ? -1 : 1;
      return (a.checkIn || '') < (b.checkIn || '') ? -1 : 1;
    });
  }

  /* ===== Row builder ===== */
  function _profitRow(b) {
    var curr = b.currency || CURRENCY_DEFAULT;
    var isPaid = b.feeStatus === FEE_TYPES.PAID;
    var rules = STATUS_RULES[b.status] || { canEdit: true };
    var chargeGuest = Number(b.chargeGuest) || 0;
    var chargeCompany = Number(b.chargeCompany) || 0;
    var profit = chargeGuest - chargeCompany;

    var html = '<tr data-fbkey="' + Utils.escapeHtml(b._fbKey || '') + '"'
      + (isPaid ? '' : ' style="opacity:0.5;')
      + '">';

    html += '<td style="font-weight:600;">' + Utils.escapeHtml(b.agent || '-') + '</td>';
    html += '<td>' + Utils.escapeHtml(b.guestName || '-') + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.escapeHtml(b.hotel || '-') + '</td>';

    /* Charge guest (read-only) */
    html += '<td class="num-cell cell-cg">';
    if (isPaid) {
      html += Utils.formatCurrency(chargeGuest, curr);
    } else {
      html += '<span style="color:var(--text-muted);">-</span>';
    }
    html += '</td>';

    /* Charge company (editable for paid bookings) */
    html += '<td class="num-cell cell-cc">';
    if (isPaid) {
      if (rules.canEdit) {
        html += '<input type="number" min="0" class="fee-input" value="' + chargeCompany + '" ';
        html += 'onchange="ProfitPage.updateChargeCompany(this,\'' + Utils.escapeHtml(b._fbKey || '') + '\')" ';
        html += 'style="width:70px;text-align:right;padding:2px 4px;font-size:var(--fs-sm);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);">';
      } else {
        html += Utils.formatCurrency(chargeCompany, curr);
      }
    } else {
      html += '<span style="color:var(--text-muted);">-</span>';
    }
    html += '</td>';

    /* Profit (auto-calculated) */
    html += '<td class="num-cell cell-profit" style="font-weight:700;';
    if (isPaid) {
      html += profit > 0 ? 'color:var(--color-success);">' : profit < 0 ? 'color:var(--color-danger);">' : '">';
      html += Utils.formatCurrency(profit, curr);
    } else {
      html += 'color:var(--text-muted);">-</span>';
    }
    html += '</td>';

    /* Currency (editable dropdown) */
    html += '<td style="font-size:var(--fs-sm);">';
    html += '<select class="fee-input" onchange="ProfitPage.updateCurrency(this,\'' + Utils.escapeHtml(b._fbKey || '') + '\')" ';
    html += 'style="width:60px;padding:2px 4px;font-size:var(--fs-sm);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);">';
    for (var ci = 0; ci < CURRENCY_OPTIONS.length; ci++) {
      html += '<option value="' + CURRENCY_OPTIONS[ci].value + '"' + (CURRENCY_OPTIONS[ci].value === curr ? ' selected' : '') + '>' + Utils.escapeHtml(CURRENCY_OPTIONS[ci].value) + '</option>';
    }
    html += '</select>';
    html += '</td>';

    html += '</tr>';
    return html;
  }

  /* ===== Summary row ===== */
  function _summaryRow(bookings) {
    var totals = _calcTotals(bookings);

    var html = '<tr id="profit-summary-row" style="background:var(--bg-base);font-weight:700;border-top:2px solid var(--border-default);">';
    html += '<td colspan="3">合計</td>';
    html += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeGuest, CURRENCY_DEFAULT) + '</td>';
    html += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeCompany, CURRENCY_DEFAULT) + '</td>';
    html += '<td class="num-cell" style="color:' + (totals.profit >= 0 ? 'var(--color-success)' : 'var(--color-danger)') + ';">' + Utils.formatCurrency(totals.profit, CURRENCY_DEFAULT) + '</td>';
    html += '<td></td>';
    html += '</tr>';
    return html;
  }

  function _calcTotals(bookings) {
    var chargeGuest = 0, chargeCompany = 0, profit = 0;
    for (var i = 0; i < bookings.length; i++) {
      var b = bookings[i];
      if (b.feeStatus === 'paid') {
        chargeGuest += Number(b.chargeGuest) || 0;
        chargeCompany += Number(b.chargeCompany) || 0;
        profit += (Number(b.chargeGuest) || 0) - (Number(b.chargeCompany) || 0);
      }
    }
    return { chargeGuest: chargeGuest, chargeCompany: chargeCompany, profit: profit };
  }

  function _buildKPIs(monthBookings, feeCounts, feeStatsData) {
    var html = '';
    html += _kpiCard('kpi-amber', '收費房', feeCounts.paid, '間', '需填入交公司金額',
      '<svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>');
    if (feeStatsData.paid.count > 0) {
      html += _kpiCard('kpi-blue', '向客人收合計', Utils.formatCurrency(feeStatsData.paid.chargeGuest, CURRENCY_DEFAULT), '', '收費房',
        '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>');
      html += _kpiCard('kpi-gold', '交公司合計', Utils.formatCurrency(feeStatsData.paid.chargeCompany, CURRENCY_DEFAULT), '', '收費房',
        '<svg viewBox="0 0 24 24"><path d="M19 14V6c0-1.1-.9-2-2-2H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zm-9-1.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>');
      var totalProfit = feeStatsData.paid.chargeGuest - feeStatsData.paid.chargeCompany;
      html += _kpiCard(totalProfit >= 0 ? 'kpi-green' : 'kpi-amber', '利潤合計', Utils.formatCurrency(totalProfit, CURRENCY_DEFAULT), '', '客人收 - 公司',
        '<svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>');
    }
    return html;
  }

  /* ===== Silent update: chargeCompany ===== */
  function updateChargeCompany(inputEl, fbKey) {
    try {
      /* Seal check */
      var _sc = Bookings.getByKey(fbKey);
      if (_sc && _sc.checkOut && State.isMonthClosed(_sc.checkOut.slice(0, 7))) {
        Toast.warning('此月份已封存，不可修改');
        return;
      }
      var num = Number(inputEl.value) || 0;
      var updated = Bookings.update(fbKey, { chargeCompany: num });
      if (updated) {
        /* Update profit cell in-place */
        var tr = inputEl.closest('tr');
        if (tr) {
          var profitCell = tr.querySelector('.cell-profit');
          if (profitCell) {
            var curr = updated.currency || CURRENCY_DEFAULT;
            var chargeGuest = Number(updated.chargeGuest) || 0;
            var chargeCompany = Number(updated.chargeCompany) || 0;
            var profit = chargeGuest - chargeCompany;
            profitCell.style.fontWeight = '700';
            profitCell.style.color = profit > 0 ? 'var(--color-success)' : profit < 0 ? 'var(--color-danger)' : '';
            profitCell.textContent = Utils.formatCurrency(profit, curr);
          }
        }
        _updateSummary();
        _updateKPIs();
      }
    } catch (e) {
      console.error('[ProfitPage] updateChargeCompany error:', e);
      Toast.show('更新失敗', 'error');
    }
  }

  /* ===== Silent update: currency ===== */
  function updateCurrency(selectEl, fbKey) {
    try {
      /* Seal check */
      var _sc = Bookings.getByKey(fbKey);
      if (_sc && _sc.checkOut && State.isMonthClosed(_sc.checkOut.slice(0, 7))) {
        Toast.warning('此月份已封存，不可修改');
        return;
      }
      var newCurr = selectEl.value;
      var updated = Bookings.update(fbKey, { currency: newCurr });
      if (updated) {
        var tr = selectEl.closest('tr');
        if (tr) {
          var curr = updated.currency || CURRENCY_DEFAULT;
          var chargeGuest = Number(updated.chargeGuest) || 0;
          var chargeCompany = Number(updated.chargeCompany) || 0;
          var profit = chargeGuest - chargeCompany;
          var isPaid = updated.feeStatus === FEE_TYPES.PAID;

          /* Update charge guest cell */
          var cgCell = tr.querySelector('.cell-cg');
          if (cgCell && isPaid) {
            cgCell.textContent = Utils.formatCurrency(chargeGuest, curr);
          }

          /* Update profit cell */
          var profitCell = tr.querySelector('.cell-profit');
          if (profitCell && isPaid) {
            profitCell.style.fontWeight = '700';
            profitCell.style.color = profit > 0 ? 'var(--color-success)' : profit < 0 ? 'var(--color-danger)' : '';
            profitCell.textContent = Utils.formatCurrency(profit, curr);
          }
        }
        Toast.show('幣別已更新', 'success');
      }
    } catch (e) {
      console.error('[ProfitPage] updateCurrency error:', e);
      Toast.show('更新失敗', 'error');
    }
  }

  /* ===== Update summary row in-place ===== */
  function _updateSummary() {
    var tbody = document.getElementById('profit-table-body');
    if (!tbody) return;
    var summaryRow = document.getElementById('profit-summary-row');
    if (!summaryRow) return;

    /* Recalculate from all visible booking rows */
    var dataRows = tbody.querySelectorAll('tr[data-fbkey]');
    var totals = { chargeGuest: 0, chargeCompany: 0, profit: 0 };

    for (var i = 0; i < dataRows.length; i++) {
      var fbKey = dataRows[i].getAttribute('data-fbkey');
      var b = Bookings.getByKey(fbKey);
      if (!b) continue;
      if (b.feeStatus === 'paid') {
        totals.chargeGuest += Number(b.chargeGuest) || 0;
        totals.chargeCompany += Number(b.chargeCompany) || 0;
        totals.profit += (Number(b.chargeGuest) || 0) - (Number(b.chargeCompany) || 0);
      }
    }

    summaryRow.innerHTML = '<td colspan="3">合計</td>';
    summaryRow.innerHTML += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeGuest, CURRENCY_DEFAULT) + '</td>';
    summaryRow.innerHTML += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeCompany, CURRENCY_DEFAULT) + '</td>';
    summaryRow.innerHTML += '<td class="num-cell" style="color:' + (totals.profit >= 0 ? 'var(--color-success)' : 'var(--color-danger)') + ';">' + Utils.formatCurrency(totals.profit, CURRENCY_DEFAULT) + '</td>';
    summaryRow.innerHTML += '<td></td>';
  }

  /* ===== Update KPI cards in-place ===== */
  function _updateKPIs() {
    var kpiGrid = document.getElementById('profit-kpi-grid');
    if (!kpiGrid) return;
    var month = State.get('workingMonth') || Utils.currentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });
    var feeCounts = Stats.countByFeeStatus(monthBookings);
    var feeStatsData = Stats.feeStats(monthBookings);
    kpiGrid.innerHTML = _buildKPIs(monthBookings, feeCounts, feeStatsData);

    /* Also update filter buttons */
    var filterButtons = document.querySelectorAll('.quick-filter-btn');
    if (filterButtons.length >= 3) {
      filterButtons[0].textContent = '全部 (' + monthBookings.length + ')';
      filterButtons[1].textContent = '收費 (' + feeCounts.paid + ')';
      filterButtons[2].textContent = '免費 (' + feeCounts.free + ')';
    }
  }

  function setFilter(fee) {
    _filterFee = fee;
    render();
  }

  /* ===== Private helpers ===== */
  function _kpiCard(colorClass, label, value, unit, sub, iconSvg) {
    var html = '<div class="kpi-card ' + colorClass + '">';
    html += '  <div class="kpi-header"><span class="kpi-label">' + Utils.escapeHtml(label) + '</span><div class="kpi-icon">' + iconSvg + '</div></div>';
    html += '  <div class="kpi-value tabular-nums">' + value + '</div>';
    if (unit || sub) {
      html += '  <span class="kpi-sub">';
      if (unit) html += Utils.escapeHtml(unit);
      if (unit && sub) html += ' — ';
      if (sub) html += Utils.escapeHtml(sub);
      html += '</span>';
    }
    html += '</div>';
    return html;
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' + Utils.escapeHtml(text) + '</div>';
  }

  return {
    render: render,
    updateChargeCompany: updateChargeCompany,
    updateCurrency: updateCurrency,
    setFilter: setFilter
  };
})();

function renderProfit() { ProfitPage.render(); }

</script>

<!-- ===== src/pages/fees.js ===== -->
<script>
/**
 * fees.js — Fee Collection Page (Ctrl+3)
 * Booking System v2.0.8
 * Accountant fills volume → auto-calc discount/remaining → auto-determine fee status → fill charge amount
 * Silent save: updates DOM in-place without full page re-render
 */
var FeesPage = (function () {

  var _filterFee = '';  /* '', 'free', 'paid' */

  function render() {
    var container = document.getElementById('page-fees');
    if (!container) return;

    var month = State.get('workingMonth') || Utils.currentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });
    var feeCounts = Stats.countByFeeStatus(monthBookings);
    var feeStatsData = Stats.feeStats(monthBookings);

    var html = '';

    /* Page header */
    html += '<div class="page-header">';
    html += '  <h3>費用收取 — ' + month + '</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-secondary" onclick="window.print()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>';
    html += '      列印';
    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    /* KPI Cards */
    html += '<div class="kpi-grid" id="fee-kpi-grid">';
    html += _buildKPIs(monthBookings, feeCounts, feeStatsData);
    html += '</div>';

    /* Quick filter */
    html += '<div class="quick-filters" style="margin-bottom:var(--sp-4);">';
    html += '<button class="quick-filter-btn' + (_filterFee === '' ? ' active' : '') + '" onclick="FeesPage.setFilter(\'\')">全部 (' + monthBookings.length + ')</button>';
    html += '<button class="quick-filter-btn' + (_filterFee === 'free' ? ' active' : '') + '" onclick="FeesPage.setFilter(\'free\')">免費 (' + feeCounts.free + ')</button>';
    html += '<button class="quick-filter-btn' + (_filterFee === 'paid' ? ' active' : '') + '" onclick="FeesPage.setFilter(\'paid\')">收費 (' + feeCounts.paid + ')</button>';
    html += '</div>';

    /* Fee table */
    var filtered = _filterFee ? monthBookings.filter(function (b) { return b.feeStatus === _filterFee; }) : monthBookings;
    var sorted = _sortBookings(filtered);

    html += '<div class="card">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V9H7z"/></svg></div>費用明細</div>';

    /* Formula hint */
    html += '<div style="margin-bottom:var(--sp-2);color:var(--text-muted);font-size:var(--fs-xs);">';
    html += '折抵天數 = 客戶轉碼 ÷ 每晚門檻（無條件退位）。剩餘天數 > 0 → 自動設為收費房；剩餘 = 0 → 自動設為免費房。可手動覆蓋。<br>';
    html += '向客人收 = (剩餘天數 × 每晚門檻 ÷ 10萬) × ' + State.getRoomFeeRate() + ' 元（自動帶入，可手動修改）。';
    html += '</div>';

    if (sorted.length === 0) {
      html += _emptyStateMini('暫無記錄');
    } else {
      html += '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
      html += '<table class="data-table"><thead><tr>';
      html += '<th>代理</th><th>客人</th><th>酒店</th><th>入住</th>';
      html += '<th style="text-align:center;width:45px;">天數</th>';
      html += '<th style="text-align:right;width:50px;">每晚<br>(萬)</th>';
      html += '<th style="text-align:right;width:60px;">總門檻<br>(萬)</th>';
      html += '<th style="text-align:right;width:85px;">客戶轉碼<br>(萬)</th>';
      html += '<th style="text-align:center;width:45px;">折抵<br>(天)</th>';
      html += '<th style="text-align:center;width:45px;">剩餘<br>(天)</th>';
      html += '<th style="width:50px;">費用</th>';
      html += '<th style="text-align:right;width:80px;">向客人收</th>';
      html += '<th style="width:65px;">操作</th>';
      html += '</tr></thead><tbody id="fee-table-body">';

      for (var i = 0; i < sorted.length; i++) {
        html += _feeRow(sorted[i]);
      }

      /* Summary row */
      html += _summaryRow(sorted);

      html += '</tbody></table></div></div>';
    }
    html += '</div>';

    container.innerHTML = html;
  }

  /* ===== Sort by agent first, then checkIn ===== */
  function _sortBookings(bookings) {
    return bookings.slice().sort(function (a, b) {
      var agentA = (a.agent || '').toLowerCase();
      var agentB = (b.agent || '').toLowerCase();
      if (agentA !== agentB) return agentA < agentB ? -1 : 1;
      return (a.checkIn || '') < (b.checkIn || '') ? -1 : 1;
    });
  }

  /* ===== Row builder ===== */
  function _feeRow(b) {
    var curr = b.currency || CURRENCY_DEFAULT;
    var th = Number(b.threshold) || 0;
    var n = Number(b.nights) || 0;
    var totalTh = th * n;
    var thWan = Math.round(th / 10000);
    var totalThWan = Math.round(totalTh / 10000);
    var vol = Number(b.volume) || 0;
    var volWan = vol > 0 ? Math.round(vol / 10000) : '';
    var isPaid = b.feeStatus === FEE_TYPES.PAID;
    var rules = STATUS_RULES[b.status] || { canEdit: true };

    /* Calculate discount & remaining */
    var discountDays = _calcDiscount(vol, th);
    var remaining = n - discountDays;

    var html = '<tr data-fbkey="' + Utils.escapeHtml(b._fbKey || '') + '">';
    html += '<td style="font-weight:600;">' + Utils.escapeHtml(b.agent || '-') + '</td>';
    html += '<td>' + Utils.escapeHtml(b.guestName || '-') + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.escapeHtml(b.hotel || '-') + '</td>';
    html += '<td style="font-size:var(--fs-sm);">' + Utils.formatDateDisplay(b.checkIn) + '</td>';
    html += '<td class="num-cell cell-nights">' + n + '</td>';
    html += '<td class="num-cell cell-th-night">' + thWan + '</td>';
    html += '<td class="num-cell cell-th-total">' + totalThWan + '</td>';

    /* Volume input */
    html += '<td class="num-cell cell-vol">';
    if (rules.canEdit) {
      html += '<input type="number" min="0" step="1" class="fee-input" value="' + volWan + '" ';
      html += 'onchange="FeesPage.updateVolume(this,\'' + Utils.escapeHtml(b._fbKey || '') + '\')" ';
      html += 'placeholder="萬" style="width:60px;text-align:right;padding:2px 4px;font-size:var(--fs-sm);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);">';
    } else {
      html += (volWan || '<span style="color:var(--text-muted);">-</span>');
    }
    html += '</td>';

    /* Discount */
    html += '<td class="num-cell cell-disc">' + (discountDays === 0 ? '<span style="color:var(--text-muted);">0</span>' : discountDays) + '</td>';

    /* Remaining */
    html += '<td class="num-cell cell-rem">' + _remainingHTML(remaining) + '</td>';

    /* Fee status badge */
    html += '<td class="cell-fee"><span class="fee-badge ' + (b.feeStatus || 'free') + '">' + (FEE_TYPE_LABELS[b.feeStatus] || '免費') + '</span></td>';

    /* Charge guest */
    html += '<td class="num-cell cell-cg">';
    if (isPaid) {
      if (rules.canEdit) {
        html += '<input type="number" min="0" class="fee-input" value="' + (b.chargeGuest || 0) + '" ';
        html += 'onchange="FeesPage.updateChargeGuest(this,\'' + Utils.escapeHtml(b._fbKey || '') + '\')" ';
        html += 'style="width:65px;text-align:right;padding:2px 4px;font-size:var(--fs-sm);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);">';
      } else {
        html += Utils.formatCurrency(b.chargeGuest, curr);
      }
    } else {
      html += '<span style="color:var(--text-muted);">-</span>';
    }
    html += '</td>';

    /* Action: toggle free/paid */
    html += '<td class="cell-action">';
    if (rules.canEdit) {
      if (isPaid) {
        html += '<button class="btn btn-ghost btn-sm" onclick="FeesPage.toggleFee(\'' + Utils.escapeHtml(b._fbKey || '') + '\',\'free\')">改免費</button>';
      } else {
        html += '<button class="btn btn-ghost btn-sm" onclick="FeesPage.toggleFee(\'' + Utils.escapeHtml(b._fbKey || '') + '\',\'paid\')">改收費</button>';
      }
    } else {
      html += '<span style="color:var(--text-muted);font-size:var(--fs-xs);">已鎖定</span>';
    }
    html += '</td>';

    html += '</tr>';
    return html;
  }

  /* ===== Helpers ===== */

  function _calcDiscount(vol, th) {
    if (vol > 0 && th > 0) return Math.floor(vol / th);
    return 0;
  }

  /* ===== Auto-calc room fee: (remainingNights × threshold / 100000) × rate ===== */
  function _calcRoomFee(remainingNights, threshold) {
    if (remainingNights <= 0 || threshold <= 0) return 0;
    var rate = State.getRoomFeeRate();
    var units = (remainingNights * threshold) / ROOM_FEE_UNIT;
    return Math.round(units * rate);
  }

  function _remainingHTML(remaining) {
    if (remaining <= 0) {
      return '<span style="color:var(--color-success);font-weight:700;">達標</span>';
    }
    return '<span style="color:var(--color-danger);font-weight:700;">' + remaining + '</span>';
  }

  function _summaryRow(bookings) {
    var totals = _calcTotals(bookings);

    var html = '<tr id="fee-summary-row" style="background:var(--bg-base);font-weight:700;border-top:2px solid var(--border-default);">';
    html += '<td colspan="4">合計</td>';
    html += '<td class="num-cell">' + totals.nights + '</td>';
    html += '<td></td>';
    html += '<td></td>';
    html += '<td></td>';
    html += '<td class="num-cell">' + totals.discount + '</td>';
    html += '<td class="num-cell" style="color:var(--color-danger);">' + totals.remaining + '</td>';
    html += '<td></td>';
    html += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeGuest, CURRENCY_DEFAULT) + '</td>';
    html += '<td></td>';
    html += '</tr>';
    return html;
  }

  function _calcTotals(bookings) {
    var nights = 0, discount = 0, remaining = 0, chargeGuest = 0, profit = 0;
    for (var i = 0; i < bookings.length; i++) {
      var b = bookings[i];
      var n = Number(b.nights) || 0;
      var th = Number(b.threshold) || 0;
      var vol = Number(b.volume) || 0;
      var disc = _calcDiscount(vol, th);
      var rem = n - disc;
      nights += n;
      discount += disc;
      if (rem > 0) remaining += rem;
      if (b.feeStatus === 'paid') {
        chargeGuest += Number(b.chargeGuest) || 0;
        profit += Number(b.profit) || 0;
      }
    }
    return { nights: nights, discount: discount, remaining: remaining, chargeGuest: chargeGuest, profit: profit };
  }

  function _buildKPIs(monthBookings, feeCounts, feeStatsData) {
    var html = '';
    html += _kpiCard('kpi-green', '免費房', feeCounts.free, '間', '無需收費',
      '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>');
    html += _kpiCard('kpi-amber', '收費房', feeCounts.paid, '間', '需填入金額',
      '<svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>');
    if (feeStatsData.paid.count > 0) {
      html += _kpiCard('kpi-blue', '向客人收合計', Utils.formatCurrency(feeStatsData.paid.chargeGuest, CURRENCY_DEFAULT), '', '收費房',
        '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>');
      html += _kpiCard('kpi-gold', '利潤合計', Utils.formatCurrency(feeStatsData.paid.profit, CURRENCY_DEFAULT), '', '客人收 - 公司',
        '<svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>');
    }
    return html;
  }

  /* ===== Silent update: volume ===== */
  function updateVolume(inputEl, fbKey) {
    try {
      /* Seal check */
      var _sc = Bookings.getByKey(fbKey);
      if (_sc && _sc.checkOut && State.isMonthClosed(_sc.checkOut.slice(0, 7))) {
        Toast.warning('此月份已封存，不可修改');
        return;
      }
      var wanValue = Number(inputEl.value) || 0;
      if (wanValue < 0) wanValue = 0;
      var volume = wanValue * 10000;
      var updated = Bookings.update(fbKey, { volume: volume });
      if (updated) {
        var tr = inputEl.closest('tr');
        if (tr) _recalcRow(tr, updated, true);
        _updateSummary();
        _updateKPIs();
      }
    } catch (e) {
      console.error('[FeesPage] updateVolume error:', e);
      Toast.show('更新失敗', 'error');
    }
  }

  /* ===== Silent update: chargeGuest ===== */
  function updateChargeGuest(inputEl, fbKey) {
    try {
      /* Seal check */
      var _sc = Bookings.getByKey(fbKey);
      if (_sc && _sc.checkOut && State.isMonthClosed(_sc.checkOut.slice(0, 7))) {
        Toast.warning('此月份已封存，不可修改');
        return;
      }
      var num = Number(inputEl.value) || 0;
      var updated = Bookings.update(fbKey, { chargeGuest: num });
      if (updated) {
        _updateSummary();
        _updateKPIs();
      }
    } catch (e) {
      console.error('[FeesPage] updateChargeGuest error:', e);
      Toast.show('更新失敗', 'error');
    }
  }

  /* ===== Recalculate and update a row's DOM in-place ===== */
  function _recalcRow(tr, b, autoDetermine) {
    var th = Number(b.threshold) || 0;
    var n = Number(b.nights) || 0;
    var vol = Number(b.volume) || 0;
    var curr = b.currency || CURRENCY_DEFAULT;
    var rules = STATUS_RULES[b.status] || { canEdit: true };

    /* Recalculate discount & remaining */
    var discountDays = _calcDiscount(vol, th);
    var remaining = n - discountDays;

    /* Update discount cell */
    var discCell = tr.querySelector('.cell-disc');
    if (discCell) {
      discCell.innerHTML = discountDays === 0 ? '<span style="color:var(--text-muted);">0</span>' : discountDays;
    }

    /* Update remaining cell */
    var remCell = tr.querySelector('.cell-rem');
    if (remCell) {
      remCell.innerHTML = _remainingHTML(remaining);
    }

    /* Auto-determine fee status (only when volume > 0, autoDetermine is true, and NOT manually overridden) */
    if (autoDetermine && vol > 0 && !b.feeManualOverride) {
      var newFeeStatus = remaining > 0 ? FEE_TYPES.PAID : FEE_TYPES.FREE;
      if (b.feeStatus !== newFeeStatus) {
        var updateData = { feeStatus: newFeeStatus };
        if (newFeeStatus === FEE_TYPES.FREE) {
          updateData.chargeGuest = 0;
          updateData.chargeCompany = 0;
        } else {
          /* Auto-calc room fee for paid room */
          updateData.chargeGuest = _calcRoomFee(remaining, th);
        }
        var updated = Bookings.update(b._fbKey, updateData);
        if (updated) b = updated;
      } else if (newFeeStatus === FEE_TYPES.PAID) {
        /* Already paid, but volume changed → recalc chargeGuest */
        var newFee = _calcRoomFee(remaining, th);
        if (newFee !== (Number(b.chargeGuest) || 0)) {
          var updated2 = Bookings.update(b._fbKey, { chargeGuest: newFee });
          if (updated2) b = updated2;
        }
      }
    }

    /* Refresh fee-dependent cells */
    _refreshFeeCells(tr, b, rules, curr);
  }

  /* ===== Refresh fee badge, charge guest input, action button ===== */
  function _refreshFeeCells(tr, b, rules, curr) {
    var isPaid = b.feeStatus === FEE_TYPES.PAID;
    var fbKey = Utils.escapeHtml(b._fbKey || '');

    /* Fee badge */
    var feeCell = tr.querySelector('.cell-fee');
    if (feeCell) {
      feeCell.innerHTML = '<span class="fee-badge ' + (b.feeStatus || 'free') + '">' + (FEE_TYPE_LABELS[b.feeStatus] || '免費') + '</span>';
    }

    /* Charge guest cell */
    var cgCell = tr.querySelector('.cell-cg');
    if (cgCell) {
      if (isPaid) {
        if (rules.canEdit) {
          cgCell.innerHTML = '<input type="number" min="0" class="fee-input" value="' + (b.chargeGuest || 0) + '" ';
          cgCell.innerHTML += 'onchange="FeesPage.updateChargeGuest(this,\'' + fbKey + '\')" ';
          cgCell.innerHTML += 'style="width:65px;text-align:right;padding:2px 4px;font-size:var(--fs-sm);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary);">';
        } else {
          cgCell.textContent = Utils.formatCurrency(b.chargeGuest, curr);
        }
      } else {
        cgCell.innerHTML = '<span style="color:var(--text-muted);">-</span>';
      }
    }

    /* Action button */
    var actionCell = tr.querySelector('.cell-action');
    if (actionCell) {
      if (rules.canEdit) {
        if (isPaid) {
          actionCell.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="FeesPage.toggleFee(\'' + fbKey + '\',\'free\')">改免費</button>';
        } else {
          actionCell.innerHTML = '<button class="btn btn-ghost btn-sm" onclick="FeesPage.toggleFee(\'' + fbKey + '\',\'paid\')">改收費</button>';
        }
      } else {
        actionCell.innerHTML = '<span style="color:var(--text-muted);font-size:var(--fs-xs);">已鎖定</span>';
      }
    }
  }

  /* ===== Update summary row in-place ===== */
  function _updateSummary() {
    var tbody = document.getElementById('fee-table-body');
    if (!tbody) return;
    var summaryRow = document.getElementById('fee-summary-row');
    if (!summaryRow) return;

    /* Recalculate from all visible booking rows */
    var dataRows = tbody.querySelectorAll('tr[data-fbkey]');
    var totals = { nights: 0, discount: 0, remaining: 0, chargeGuest: 0 };

    for (var i = 0; i < dataRows.length; i++) {
      var fbKey = dataRows[i].getAttribute('data-fbkey');
      var b = Bookings.getByKey(fbKey);
      if (!b) continue;
      var n = Number(b.nights) || 0;
      var th = Number(b.threshold) || 0;
      var vol = Number(b.volume) || 0;
      var disc = _calcDiscount(vol, th);
      var rem = n - disc;
      totals.nights += n;
      totals.discount += disc;
      if (rem > 0) totals.remaining += rem;
      if (b.feeStatus === 'paid') {
        totals.chargeGuest += Number(b.chargeGuest) || 0;
      }
    }

    summaryRow.innerHTML = '<td colspan="4">合計</td>';
    summaryRow.innerHTML += '<td class="num-cell">' + totals.nights + '</td>';
    summaryRow.innerHTML += '<td></td>';
    summaryRow.innerHTML += '<td></td>';
    summaryRow.innerHTML += '<td></td>';
    summaryRow.innerHTML += '<td class="num-cell">' + totals.discount + '</td>';
    summaryRow.innerHTML += '<td class="num-cell" style="color:var(--color-danger);">' + totals.remaining + '</td>';
    summaryRow.innerHTML += '<td></td>';
    summaryRow.innerHTML += '<td class="num-cell">' + Utils.formatCurrency(totals.chargeGuest, CURRENCY_DEFAULT) + '</td>';
    summaryRow.innerHTML += '<td></td>';
  }

  /* ===== Update KPI cards in-place ===== */
  function _updateKPIs() {
    var kpiGrid = document.getElementById('fee-kpi-grid');
    if (!kpiGrid) return;
    var month = State.get('workingMonth') || Utils.currentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });
    var feeCounts = Stats.countByFeeStatus(monthBookings);
    var feeStatsData = Stats.feeStats(monthBookings);
    kpiGrid.innerHTML = _buildKPIs(monthBookings, feeCounts, feeStatsData);

    /* Also update filter buttons */
    var filterButtons = document.querySelectorAll('.quick-filter-btn');
    if (filterButtons.length >= 3) {
      filterButtons[0].textContent = '全部 (' + monthBookings.length + ')';
      filterButtons[1].textContent = '免費 (' + feeCounts.free + ')';
      filterButtons[2].textContent = '收費 (' + feeCounts.paid + ')';
    }
  }

  /* ===== Manual toggle fee status (no auto-determine) ===== */
  function toggleFee(fbKey, newFee) {
    /* Seal check */
    var _sc = Bookings.getByKey(fbKey);
    if (_sc && _sc.checkOut && State.isMonthClosed(_sc.checkOut.slice(0, 7))) {
      Toast.warning('此月份已封存，不可修改');
      return;
    }
    var data = { feeStatus: newFee };
    if (newFee === FEE_TYPES.FREE) {
      data.chargeGuest = 0;
      data.chargeCompany = 0;
      data.feeManualOverride = true;  /* 手動設免費 → 鎖定，不被自動覆蓋 */
    } else {
      /* 手動改回收費 → 清除鎖定，恢復自動計算 */
      data.feeManualOverride = false;
      var b = Bookings.getByKey(fbKey);
      if (b) {
        var th = Number(b.threshold) || 0;
        var n = Number(b.nights) || 0;
        var vol = Number(b.volume) || 0;
        var disc = _calcDiscount(vol, th);
        var rem = n - disc;
        data.chargeGuest = _calcRoomFee(rem, th);
      }
    }
    var updated = Bookings.update(fbKey, data);
    if (updated) {
      var tr = document.querySelector('tr[data-fbkey="' + fbKey + '"]');
      if (tr) {
        var rules = STATUS_RULES[updated.status] || { canEdit: true };
        var curr = updated.currency || CURRENCY_DEFAULT;
        _refreshFeeCells(tr, updated, rules, curr);
      }
      _updateSummary();
      _updateKPIs();
      Toast.show('已更改為' + (FEE_TYPE_LABELS[newFee] || newFee));
    }
  }

  function setFilter(fee) {
    _filterFee = fee;
    render();
  }

  /* ===== Private helpers ===== */
  function _kpiCard(colorClass, label, value, unit, sub, iconSvg) {
    var html = '<div class="kpi-card ' + colorClass + '">';
    html += '  <div class="kpi-header"><span class="kpi-label">' + Utils.escapeHtml(label) + '</span><div class="kpi-icon">' + iconSvg + '</div></div>';
    html += '  <div class="kpi-value tabular-nums">' + value + '</div>';
    if (unit || sub) {
      html += '  <span class="kpi-sub">';
      if (unit) html += Utils.escapeHtml(unit);
      if (unit && sub) html += ' — ';
      if (sub) html += Utils.escapeHtml(sub);
      html += '</span>';
    }
    html += '</div>';
    return html;
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' + Utils.escapeHtml(text) + '</div>';
  }

  return {
    render: render,
    updateVolume: updateVolume,
    updateChargeGuest: updateChargeGuest,
    toggleFee: toggleFee,
    setFilter: setFilter
  };
})();

function renderFees() { FeesPage.render(); }

</script>

<script>
/**
 * agent-performance.js — Agent Performance Page (Ctrl+4)
 * Booking System v2.0.0 (v8 spec)
 * Renders: KPI + agent × casino matrix + agent ranking + per-agent breakdown
 * Note: Agents != Employees (agents represent customers, employees operate the Bot)
 */
var AgentPerfPage = (function () {

  function render() {
    var container = document.getElementById('page-agent-performance');
    if (!container) return;

    var month = State.get('workingMonth') || Utils.currentMonth();
    var monthBookings = Filters.filterBookings(Bookings.getAll(), { month: month });
    var activeAgents = Agents.getAllNames();

    var html = '';

    /* Page header */
    html += '<div class="page-header">';
    html += '  <h3>代理業績 — ' + month + '</h3>';
    html += '  <div class="page-actions">';
    html += '    <button class="btn btn-secondary" onclick="window.print()">';
    html += '      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>';

    html += '    </button>';
    html += '  </div>';
    html += '</div>';

    /* KPI Cards */
    var totalProfit = Stats.totalProfit(monthBookings.filter(function (b) { return b.feeStatus === 'paid'; }));
    html += '<div class="kpi-grid">';
    html += _kpiCard('kpi-blue', '活躍代理', activeAgents.length, '位', '本月有訂房代理',
      '<svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>');
    html += _kpiCard('kpi-green', '總訂房數', monthBookings.length, '間', '本月所有訂房',
      '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>');
    html += _kpiCard('kpi-amber', '收費房利潤', Utils.formatCurrency(totalProfit, CURRENCY_DEFAULT), '', '收費房合計',
      '<svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>');
    html += _kpiCard('kpi-gold', '總房晚', Stats.calcMonthlyNights(monthBookings, month).nights, '晚', '一訂房 = 一房',
      '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>');
    html += '</div>';

    /* Agent × Casino matrix */
    html += '<div class="card" style="margin-bottom:var(--sp-4);">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg></div>代理 × 體系 矩陣</div>';
    html += _agentMatrixTable(monthBookings);
    html += '</div>';

    /* Two columns: ranking + profit breakdown */
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">';

    /* Agent ranking by count */
    html += '<div class="card">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></div>訂房排行</div>';
    html += _rankingTable(Stats.topAgents(monthBookings, 10), 'agent', '訂房數');
    html += '</div>';

    /* Agent profit ranking */
    html += '<div class="card">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>利潤排行</div>';
    html += _profitRankingTable(monthBookings);
    html += '</div>';

    html += '</div>';

    /* Booking detail table with threshold per booking */
    html += '<div class="card" style="margin-top:var(--sp-4);">';
    html += '  <div class="card-title"><div class="card-icon"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zm0-8v2h14V9H7z"/></svg></div>逐筆訂房明細（含洗碼門檻）</div>';
    html += _detailTable(monthBookings);
    html += '</div>';

    container.innerHTML = html;
  }

  function _agentMatrixTable(bookings) {
    var matrix = Stats.agentMatrix(bookings);
    var agents = [];
    for (var a in matrix) {
      agents.push({ name: a, total: matrix[a]._total || 0 });
    }
    agents.sort(function (x, y) { return y.total - x.total; });

    /* Collect all casinos from data + preset */
    var casinos = CASINO_ORDER.slice();
    for (var ag in matrix) {
      for (var ck in matrix[ag]) {
        if (ck !== '_total' && casinos.indexOf(ck) === -1) casinos.push(ck);
      }
    }

    if (agents.length === 0) return _emptyStateMini('暫無數據');

    var html = '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="matrix-table"><thead><tr><th>代理</th>';
    for (var i = 0; i < casinos.length; i++) {
      html += '<th class="num-cell">' + Utils.escapeHtml(casinos[i]) + '</th>';
    }
    html += '<th class="num-cell">合計</th></tr></thead><tbody>';

    var grandTotal = 0;
    for (var j = 0; j < agents.length; j++) {
      var row = matrix[agents[j].name];
      html += '<tr><td style="font-weight:600;">' + Utils.escapeHtml(agents[j].name) + '</td>';
      for (var ci = 0; ci < casinos.length; ci++) {
        var count = row[casinos[ci]] || 0;
        html += '<td class="num-cell">' + (count || '-') + '</td>';
      }
      html += '<td class="num-cell" style="font-weight:700;color:var(--color-primary);">' + (row._total || 0) + '</td></tr>';
      grandTotal += (row._total || 0);
    }

    /* Totals row */
    html += '<tr style="background:var(--bg-base);font-weight:700;"><td>合計</td>';
    for (var ck2 = 0; ck2 < casinos.length; ck2++) {
      var colTotal = 0;
      for (var ai = 0; ai < agents.length; ai++) {
        colTotal += (matrix[agents[ai].name][casinos[ck2]] || 0);
      }
      html += '<td class="num-cell">' + (colTotal || '-') + '</td>';
    }
    html += '<td class="num-cell" style="color:var(--color-primary);">' + grandTotal + '</td></tr>';

    html += '</tbody></table></div></div>';
    return html;
  }

  function _rankingTable(items, field, label) {
    if (!items || items.length === 0) return _emptyStateMini('暫無數據');

    var html = '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="data-table"><thead><tr><th>#</th><th>代理</th><th class="num-cell">' + label + '</th></tr></thead><tbody>';

    for (var i = 0; i < items.length; i++) {
      var rank = i + 1;
      var rankIcon = rank === 1 ? '\uD83E\uDD47' : rank === 2 ? '\uD83E\uDD48' : rank === 3 ? '\uD83E\uDD49' : rank;
      html += '<tr><td style="text-align:center;">' + rankIcon + '</td>';
      html += '<td style="font-weight:600;">' + Utils.escapeHtml(items[i][field]) + '</td>';
      html += '<td class="num-cell">' + items[i].count + '</td></tr>';
    }

    html += '</tbody></table></div></div>';
    return html;
  }

  function _profitRankingTable(bookings) {
    var map = Stats.profitByAgent(bookings);
    var arr = [];
    for (var name in map) {
      if (map[name].profit > 0) {
        arr.push({ agent: name, profit: map[name].profit, count: map[name].count });
      }
    }
    arr.sort(function (a, b) { return b.profit - a.profit; });

    if (arr.length === 0) return _emptyStateMini('暫無利潤數據');

    var html = '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="data-table"><thead><tr><th>#</th><th>代理</th><th class="num-cell">利潤</th></tr></thead><tbody>';

    for (var i = 0; i < arr.length; i++) {
      var rank = i + 1;
      var rankIcon = rank === 1 ? '\uD83E\uDD47' : rank === 2 ? '\uD83E\uDD48' : rank === 3 ? '\uD83E\uDD49' : rank;
      html += '<tr><td style="text-align:center;">' + rankIcon + '</td>';
      html += '<td style="font-weight:600;">' + Utils.escapeHtml(arr[i].agent) + '</td>';
      html += '<td class="num-cell" style="font-weight:700;color:var(--color-warning);">' + Utils.formatCurrency(arr[i].profit, CURRENCY_DEFAULT) + '</td></tr>';
    }

    html += '</tbody></table></div></div>';
    return html;
  }

  function _detailTable(bookings) {
    if (!bookings || bookings.length === 0) return _emptyStateMini('暫無數據');

    /* Sort by agent, then checkIn */
    var sorted = bookings.slice().sort(function (a, b) {
      var agentA = (a.agent || '').toLowerCase();
      var agentB = (b.agent || '').toLowerCase();
      if (agentA !== agentB) return agentA < agentB ? -1 : 1;
      return (a.checkIn || '') < (b.checkIn || '') ? -1 : 1;
    });

    var html = '<div style="margin-bottom:var(--sp-2);color:var(--text-muted);font-size:var(--fs-xs);">';
    html += '折抵天數 = 客戶轉碼 ÷ 每晚門檻（無條件退位）。轉碼金額請至「費用收取」頁面填寫。';
    html += '</div>';
    html += '<div class="data-table-wrap"><div class="data-table-scroll scroll-hint scrollable">';
    html += '<table class="data-table"><thead><tr>';
    html += '<th>代理</th><th>客人</th><th>酒店</th><th>入住</th>';
    html += '<th style="text-align:center;width:60px;">入住天數</th>';
    html += '<th style="text-align:right;width:60px;">每晚(萬)</th>';
    html += '<th style="text-align:right;width:70px;">總門檻(萬)</th>';
    html += '<th style="text-align:right;width:100px;">客戶轉碼(萬)</th>';
    html += '<th style="text-align:center;width:60px;">折抵(天)</th>';
    html += '<th style="text-align:center;width:60px;">剩餘(天)</th>';
    html += '<th>狀態</th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < sorted.length; i++) {
      var b = sorted[i];
      var th = Number(b.threshold) || 0;
      var n = Number(b.nights) || 0;
      var totalTh = th * n;
      var thWan = Math.round(th / 10000);
      var totalThWan = Math.round(totalTh / 10000);

      var vol = Number(b.volume) || 0;
      var volWan = vol > 0 ? Math.round(vol / 10000) : 0;

      /* Discount days = floor(volume / threshold) */
      var discountDays = 0;
      if (vol > 0 && th > 0) {
        discountDays = Math.floor(vol / th);
      }
      var discountLabel = (vol > 0 && discountDays === 0) ? '0' : (vol > 0 ? discountDays : '-');

      var remaining = n - discountDays;
      var remainingLabel, remainingStyle;
      if (vol === 0) {
        remainingLabel = '-';
        remainingStyle = 'color:var(--text-muted);';
      } else if (remaining <= 0) {
        remainingLabel = '達標';
        remainingStyle = 'color:var(--color-success);font-weight:700;';
      } else {
        remainingLabel = remaining;
        remainingStyle = 'color:var(--color-danger);font-weight:700;';
      }

      var statusLabel = _statusLabel(b.status);
      html += '<tr>';
      html += '<td style="font-weight:600;">' + Utils.escapeHtml(b.agent || '-') + '</td>';
      html += '<td>' + Utils.escapeHtml(b.guestName || '-') + '</td>';
      html += '<td>' + Utils.escapeHtml(b.hotel || '-') + '</td>';
      html += '<td>' + Utils.escapeHtml((b.checkIn || '').slice(0, 10)) + '</td>';
      html += '<td style="text-align:center;">' + n + '</td>';
      html += '<td style="text-align:right;">' + thWan + '</td>';
      html += '<td style="text-align:right;">' + totalThWan + '</td>';
      html += '<td style="text-align:right;' + (vol === 0 ? 'color:var(--text-muted);' : '') + '">' + (vol > 0 ? volWan : '-') + '</td>';
      html += '<td style="text-align:center;">' + discountLabel + '</td>';
      html += '<td style="text-align:center;' + remainingStyle + '">' + remainingLabel + '</td>';
      html += '<td>' + statusLabel + '</td>';
      html += '</tr>';
    }

    html += '</tbody></table></div></div>';
    return html;
  }

  function _statusLabel(status) {
    var map = {
      'pending': '<span style="color:var(--color-info);">待確認</span>',
      'confirmed': '<span style="color:var(--color-warning);">已確認</span>',
      'checked-in': '<span style="color:var(--color-success);">已入住</span>',
      'checked-out': '<span style="color:var(--text-muted);">已退房</span>',
      'cancelled': '<span style="color:var(--color-danger);">已取消</span>'
    };
    return map[status] || Utils.escapeHtml(status || '-');
  }

  function _kpiCard(colorClass, label, value, unit, sub, iconSvg) {
    var html = '<div class="kpi-card ' + colorClass + '">';
    html += '  <div class="kpi-header"><span class="kpi-label">' + Utils.escapeHtml(label) + '</span><div class="kpi-icon">' + iconSvg + '</div></div>';
    html += '  <div class="kpi-value tabular-nums">' + value + '</div>';
    if (unit || sub) {
      html += '  <span class="kpi-sub">';
      if (unit) html += Utils.escapeHtml(unit);
      if (unit && sub) html += ' — ';
      if (sub) html += Utils.escapeHtml(sub);
      html += '</span>';
    }
    html += '</div>';
    return html;
  }

  function _emptyStateMini(text) {
    return '<div style="padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);">' + Utils.escapeHtml(text) + '</div>';
  }

  return { render: render };
})();

function renderAgentPerformance() { AgentPerfPage.render(); }

</script>

<script>
